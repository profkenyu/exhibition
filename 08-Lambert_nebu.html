<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Act III, Scene 3.</title>
<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#010105;
    touch-action:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
canvas{
    display:block;
}


#hud-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
}

.interactive {
    pointer-events: auto;
}

#title-section {
    position: absolute;
    top: 30px;
    left: 30px;
    color: #ffffff;
}

#title-section h1 {
    margin: 0 0 4px 0;
    font-size: 32px;
    font-weight: 200;
    letter-spacing: 0.3em;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

#title-section p {
    margin: 0;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
}


#data-monitor {
    position: absolute;
    bottom: 30px;
    left: 30px;
    color: rgba(255,255,255,0.7);
    font-family: monospace;
    font-size: 11px;
    line-height: 1.6;
    background: rgba(2, 2, 8, 0.6);
    padding: 15px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(5px);
}

.data-row {
    display: table-row;
}
.data-label {
    display: table-cell;
    padding-right: 15px;
    color: rgba(255,255,255,0.4);
}
.data-value {
    display: table-cell;
    text-align: left;
}

#guide-overlay {
    position: absolute;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-align: center;
    animation: pulse 2s infinite ease-in-out;
}


#control-panel {
    position: absolute;
    top: 30px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
}

.btn-group {
    display: flex;
    gap: 8px;
}

.btn {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.15em;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 18px;
    border-radius: 4px;
    background: rgba(2, 2, 8, 0.4);
    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
    cursor: pointer;
    text-align: center;
    user-select: none;
}

.btn:hover {
    color: #ffffff;
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.btn.active {
    color: #ffd700;
    border-color: rgba(255, 215, 0, 0.4);
    background: rgba(255, 215, 0, 0.05);
}

#audio-btn {
    color: #ff3366;
    border-color: rgba(255, 51, 102, 0.3);
}
#audio-btn.active {
    color: #33ff99;
    border-color: rgba(51, 255, 153, 0.5);
    background: rgba(51, 255, 153, 0.05);
}

@keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
}

@media (max-width: 768px) {
    #title-section h1 { font-size: 20px; }
    #data-monitor { display: none; }
    #guide-overlay { width: 80%; font-size: 10px; }
    #control-panel { top: auto; bottom: 30px; right: 30px; }
}
</style>
</head>
<body>

<div id="hud-container">
    <div id="title-section">
        <h1>LAMBERT NEBULA</h1>
        <p>W₀(x) ∪ W₋₁(x) &nbsp;·&nbsp;Move Mouse / Click&nbsp;·&nbsp;Core Pulse&nbsp;·&nbsp;Audio-Reactive</p>
    </div>

    <div id="data-monitor">
        <div class="data-row"><div class="data-label">VISIBILITY:</div><div class="data-value" id="val-vis">ALL BRANCHES</div></div>
        <div class="data-row"><div class="data-label">BASS ENERGY:</div><div class="data-value" id="val-bass">0.00</div></div>
        <div class="data-row"><div class="data-label">HIGH ENERGY:</div><div class="data-value" id="val-high">0.00</div></div>
        <div class="data-row"><div class="data-label">PARTICLES:</div><div class="data-value">60,000</div></div>
    </div>

    <div id="guide-overlay">
        [ ACTIVATE AUDIO TO EXPERIENCE AUDIO-REACTIVE NEBULA ]
    </div>

    <div id="control-panel">
        <div class="btn-group">
            <div id="audio-btn" class="btn interactive">AUDIO INPUT: OFF</div>
        </div>
        <div class="btn-group">
            <div id="btn-all" class="btn interactive active">SHOW ALL</div>
            <div id="btn-w0" class="btn interactive">W₀ ONLY</div>
            <div id="btn-wm1" class="btn interactive">W₋₁ ONLY</div>
        </div>
        <a href="javascript:history.back();" class="btn interactive">BACK</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

function W0(x){
    let w=Math.log(1+x);
    for(let i=0;i<20;i++){
        let e=Math.exp(w);
        let f=w*e-x;
        w-=f/(e*(w+1));
    }
    return w;
}

function Wm1(x){
    let w=Math.log(-x);
    for(let i=0;i<30;i++){
        let e=Math.exp(w);
        let f=w*e-x;
        let den=e*(w+1)-((w+2)*f)/(2*w+2);
        w-=f/den;
    }
    return w;
}


const COUNT = 60000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(COUNT*3);
const col = new Float32Array(COUNT*3);


const branchType = new Uint8Array(COUNT); 
const defaultAlpha = new Float32Array(COUNT);

for(let i=0;i<COUNT;i++){
    const useLower = Math.random()>0.5;
    const x = -1/Math.E + Math.random()*5;
    let r;

    if(useLower){
        const xx = -1/Math.E + Math.random()*(1/Math.E);
        r=-Wm1(xx);
        branchType[i] = 1;
    }else{
        r=W0(x);
        branchType[i] = 0;
    }

    const t = Math.random()*Math.PI*40;
    const spiral = r*12;
    const X = Math.cos(t)*spiral;
    const Y = Math.sin(t)*spiral;
    const Z = (t*0.6)-40;

    pos[i*3]=X;
    pos[i*3+1]=Y;
    pos[i*3+2]=Z;

    if(useLower){
        col[i*3]=0.1;
        col[i*3+1]=0.55;
        col[i*3+2]=1.0;
    }else{
        col[i*3]=1.0;
        col[i*3+1]=0.35;
        col[i*3+2]=0.15;
    }
}

geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
geo.setAttribute('color', new THREE.BufferAttribute(col,3));


const mat = new THREE.PointsMaterial({
    size:.35,
    vertexColors:true,
    transparent:true,
    opacity:.85,
    blending: THREE.AdditiveBlending
});

const points = new THREE.Points(geo, mat);
scene.add(points);

const core = new THREE.Mesh(
    new THREE.SphereGeometry(1.8, 32, 32),
    new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(core);


let audioContext, analyser, dataArray;
let isAudioActive = false;
let bass = 0, mid = 0, high = 0;

const audioBtn = document.getElementById('audio-btn');
const valBass = document.getElementById('val-bass');
const valHigh = document.getElementById('val-high');

audioBtn.addEventListener('click', async () => {
    if (!isAudioActive) {
        try {
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            isAudioActive = true;
            audioBtn.innerText = "AUDIO INPUT: ON";
            audioBtn.classList.add('active');
            document.getElementById('guide-overlay').innerText = "[ AUDIO ACTIVE - MAKE SOUND TO DISTORT NEBULA ]";
        } catch (err) {
            alert("마이크 오디오 권한 허용이 필요합니다: " + err.message);
        }
    } else {
        if (audioContext) {
            audioContext.close();
        }
        isAudioActive = false;
        audioBtn.innerText = "AUDIO INPUT: OFF";
        audioBtn.classList.remove('active');
        document.getElementById('guide-overlay').innerText = "[ ACTIVATE AUDIO TO EXPERIENCE AUDIO-REACTIVE NEBULA ]";
        bass = mid = high = 0;
    }
});


let isolationMode = "all"; 
const btnAll = document.getElementById('btn-all');
const btnW0 = document.getElementById('btn-w0');
const btnWm1 = document.getElementById('btn-wm1');
const valVis = document.getElementById('val-vis');

function setIsolationMode(mode) {
    isolationMode = mode;
    [btnAll, btnW0, btnWm1].forEach(b => b.classList.remove('active'));
    
    if(mode === "all") {
        btnAll.classList.add('active');
        valVis.innerText = "ALL BRANCHES";
    } else if(mode === "w0") {
        btnW0.classList.add('active');
        valVis.innerText = "W₀ PRINCIPAL ONLY";
    } else {
        btnWm1.classList.add('active');
        valVis.innerText = "W₋₁ LOWER ONLY";
    }
}

btnAll.addEventListener('click', () => setIsolationMode("all"));
btnW0.addEventListener('click', () => setIsolationMode("w0"));
btnWm1.addEventListener('click', () => setIsolationMode("wm1"));

let targetRX=0;
let targetRY=0;

window.addEventListener('pointermove', e=>{
    targetRY=(e.clientX/window.innerWidth-.5)*1.5;
    targetRX=(e.clientY/window.innerHeight-.5)*1.0;
});

window.addEventListener('click', e=>{
    if(e.target.classList.contains('interactive')) return;
    core.scale.set(2.5, 2.5, 2.5);
});


const originalPositions = pos.slice();

let t=0;
function animate(){
    requestAnimationFrame(animate);
    t += 0.0025;

    
    if (isAudioActive && analyser) {
        analyser.getByteFrequencyData(dataArray);
        
        let bSum = 0, mSum = 0, hSum = 0;
        for (let i = 0; i < 8; i++) bSum += dataArray[i];        
        for (let i = 8; i < 40; i++) mSum += dataArray[i];       
        for (let i = 40; i < 128; i++) hSum += dataArray[i];     
        
        bass = bSum / 8 / 255;
        mid = mSum / 32 / 255;
        high = hSum / 88 / 255;
        
        valBass.innerText = bass.toFixed(2);
        valHigh.innerText = high.toFixed(2);
    } else {
        
        bass += (0 - bass) * 0.1;
        mid += (0 - mid) * 0.1;
        high += (0 - high) * 0.1;
    }

    
    const pAttr = points.geometry.attributes.position.array;
    const cAttr = points.geometry.attributes.color.array;
    
    for (let i = 0; i < COUNT; i++) {
        const type = branchType[i];
        
        
        let visibilityScale = 1.0;
        if (isolationMode === "w0" && type === 1) visibilityScale = 0.0;
        if (isolationMode === "wm1" && type === 0) visibilityScale = 0.0;

        
        const origX = originalPositions[i * 3];
        const origY = originalPositions[i * 3 + 1];
        const origZ = originalPositions[i * 3 + 2];
        
        
        
        const wave = Math.sin(t * 10 + i * 0.05) * high * 6.0;
        const push = 1.0 + bass * 0.4 * Math.sin(origZ * 0.1 + t * 5);
        
        pAttr[i * 3]     = origX * push * visibilityScale + Math.cos(i) * wave * visibilityScale;
        pAttr[i * 3 + 1] = origY * push * visibilityScale + Math.sin(i) * wave * visibilityScale;
        pAttr[i * 3 + 2] = origZ * visibilityScale;
    }
    points.geometry.attributes.position.needsUpdate = true;

    
    points.rotation.z += 0.0005 + mid * 0.002;
    points.rotation.y += 0.0007;

    
    const camRadius = 90 + bass * 8.0;
    camera.position.x = Math.cos(t) * camRadius;
    camera.position.z = Math.sin(t) * camRadius;
    camera.lookAt(0,0,0);

    
    scene.rotation.x += (targetRX - scene.rotation.x) * 0.03;
    scene.rotation.y += (targetRY - scene.rotation.y) * 0.03;

    
    const coreScale = 1.0 + bass * 0.8;
    core.scale.lerp(new THREE.Vector3(coreScale, coreScale, coreScale), 0.1);
    
    const c = 0.6 + 0.4 * Math.sin(Date.now() * 0.003);
    core.material.color.setRGB(1, c + high * 0.4, c);

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
