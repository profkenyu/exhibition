<style>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && innerWidth < 1024);
const PR = Math.min(devicePixelRatio, isMobile ? 1.5 : 2);
const NEB_COUNT  = isMobile ? 18000 : 45000;
const STAR_COUNT = isMobile ? 22000 : 50000;
const DISK_COUNT = isMobile ? 60000 : 150000;
const RS         = 90;
const PHOTON_R   = 155;
const ISCO       = 220;
const DISK_OUTER = 1800;
const CYCLE      = 180;

const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (x,a,b) => Math.min(b,Math.max(a,x));
function smoothstep(e0,e1,x){
  const t = clamp((x-e0)/(e1-e0),0,1);
  return t*t*(3-2*t);
}

const RADIUS_CP = [
  [0,   13000],[22, 6000],[40, 2600],[58, 1000],
  [78,   400],[96,   205],[110,  128],[145,   98]
];
function descentCurve(x){
  for(let i=0;i<RADIUS_CP.length-1;i++){
    const [t0,r0]=RADIUS_CP[i],[t1,r1]=RADIUS_CP[i+1];
    if(x>=t0&&x<=t1) return r0+(r1-r0)*smoothstep(t0,t1,x);
  }
  return RADIUS_CP[RADIUS_CP.length-1][1];
}

function effectiveX(loopT){
  if(loopT<=145) return loopT;
  if(loopT<162)  return 145;
  return 0;
}

const nebulaOpacity   = x => 1-smoothstep(38,76,x);
const ringOpacity     = x => smoothstep(18,42,x);
const einsteinOpacity = x => smoothstep(34,56,x)*(1-smoothstep(110,145,x));
const photonOpacity   = x => smoothstep(50,80,x);
const jetOpacity      = x => smoothstep(54,84,x)*(1-smoothstep(133,145,x));
const proximity       = x => Math.pow(smoothstep(36,145,x),1.3);
const swirl           = x => smoothstep(68,115,x)*1.5;
const frameDrag       = x => smoothstep(70,145,x);
const flashPulse      = x => Math.exp(-Math.pow((x-103)/5.5,2));
const overlayOpacity  = loopT => smoothstep(140,155,loopT)*(1-smoothstep(168,180,loopT));

// 슬릿 스캔: x=108부터 시작, 145에서 최대 도달 후 소멸 없이 loopT 기반으로 끝까지 유지·증폭
const slitScanIntensity = x => smoothstep(108, 138, x);
// 특이점 붕괴 이후(145~180) 슬릿스캔 종말 레이어 - loopT 기반으로 직접 계산
const collapseIntensity = loopT => smoothstep(145, 155, loopT);

const PHASE_BOUNDS = [0,22,40,58,78,96,110,145,162,180];
function phaseIndex(loopT){
  for(let i=0;i<9;i++) if(loopT<PHASE_BOUNDS[i+1]) return i;
  return 8;
}
const PHASE_EN = [
  'Drifting through the vast celestial nebula',
  'Faint ring of localized light captured in deep space',
  'Geometric warping of the Einstein Ring emerges',
  'Accelerating descent into the event horizon threshold',
  'Spacetime rupture and high-energy relativistic jet emission',
  'Passing through the hyper-dense photon sphere flux matrix',
  'Inward spiral into the extreme gravitational accretion disk',
  'Singularity penetration — Maximum Slit-Scan temporal fragmentation',
  'Beyond the event horizon — time dissolves into pure entropy',
  '∞ — All reference frames collapse. Signal lost.'
];

const MATH_EQUATIONS = [
  'ds² = -(1-Rs/r)dt² + (1-Rs/r)⁻¹dr²',
  'R_μν - 1/2 R g_μν = 8πG/c⁴ T_μν',
  'Δθ = 4GM / c²b',
  'v_obs = v_emit / √(1 - R_s/r)',
  'J = M a c',
  'r_ph = 3GM/c²',
  'Ω = 2G_J / c²r³',
  'lim (ê₁→0) ∮ SlitScan_Stretch(x, y, t) dt² = ⚡',
  'S_BH = k_B · A / 4 l_P²  [Bekenstein-Hawking]',
  'Ψ(x,t) → 0  ∀ x ∈ ℝ   // null manifold'
];

const renderer = new THREE.WebGLRenderer({
  canvas: document.createElement('canvas'),
  antialias: !isMobile,
  powerPreference: 'high-performance',
  stencil: false
});
renderer.setPixelRatio(PR);
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.domElement.id = 'webgl';
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200000);

const renderTarget = new THREE.WebGLRenderTarget(innerWidth, innerHeight, {
  depthBuffer: true,
  colorSpace: THREE.SRGBColorSpace
});

const postScene  = new THREE.Scene();
const postCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const postMaterial = new THREE.ShaderMaterial({
  uniforms:{
    tScene:        { value: renderTarget.texture },
    uResolution:   { value: new THREE.Vector2(innerWidth, innerHeight) },
    uTime:         { value: 0 },
    uMouse:        { value: new THREE.Vector2(0.5,0.5) },
    uProximity:    { value: 0 },
    uSwirl:        { value: 0 },
    uEinstein:     { value: 0 },
    uLoopTime:     { value: 0 },
    uSlitScan:     { value: 0 },
    uCollapse:     { value: 0 }
  },
  vertexShader:`
    varying vec2 vUv;
    void main(){ vUv=uv; gl_Position=vec4(position.xy,0.0,1.0); }
  `,
  fragmentShader:`
    uniform sampler2D tScene;
    uniform vec2 uResolution;
    uniform float uTime;
    uniform vec2 uMouse;
    uniform float uProximity;
    uniform float uSwirl;
    uniform float uEinstein;
    uniform float uLoopTime;
    uniform float uSlitScan;
    uniform float uCollapse;
    varying vec2 vUv;

    float pseudoNoise(vec2 p){
      return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);
    }

    void main(){
      vec2 uv = vUv;
      
      // 마우스 좌표 에러 방지 안전 캡슐
      vec2 center = vec2(
        uMouse.x < 0.0 || uMouse.x > 1.0 ? 0.5 : uMouse.x,
        uMouse.y < 0.0 || uMouse.y > 1.0 ? 0.5 : uMouse.y
      );

      // --- [ HYPER SLIT-SCAN — 108→145 고조, 145→180 종말 붕괴 ] ---
      if (uSlitScan > 0.002 || uCollapse > 0.002) {
        float ss = uSlitScan;       // 0→1 during x=108..145
        float col = uCollapse;      // 0→1 during loopT=145..180

        vec2 toCenter = uv - center;
        float distToCenter = length(toCenter);
        float slitAngle = atan(toCenter.y, toCenter.x);

        // ── 1. 방사형 칼날 슬릿 (고조기) ──
        float primarySlit = sin(slitAngle * 32.0 + uTime * 25.0) * 0.022 * ss;
        float microSlit   = sin(uv.y * uResolution.y * 0.8 - uTime * 35.0) * 0.015 * ss;
        float streakTrack = sin(distToCenter * 140.0 - uTime * 22.0) * 0.035 * ss;

        uv.x += cos(slitAngle) * (primarySlit + streakTrack) * smoothstep(0.0, 0.5, distToCenter);
        uv.y += sin(slitAngle) * (microSlit + streakTrack) * smoothstep(0.0, 0.5, distToCenter);

        // ── 2. 바코드 차원 분절 (고조기) ──
        float barcodeLine = step(0.94, sin(uv.x * uResolution.x * 0.15 + uTime)) * 0.015 * ss;
        uv.y += barcodeLine;

        // ── 3. 시간 붕괴 레이어 (loopT=145 이후 종말) ──
        if (col > 0.002) {
          // 수평 시간 분절: 행마다 다른 시간 오프셋 — 슬릿스캔 카메라의 시간축 붕괴
          float rowSeed = floor(uv.y * uResolution.y / mix(2.0, 0.3, col));
          float rowOffset = pseudoNoise(vec2(rowSeed, floor(uTime * 8.0))) * col * 0.18;
          uv.x += rowOffset;

          // 수직 분열: 열마다 시간이 달라지는 vertical time-smear
          float colSeed = floor(uv.x * uResolution.x / mix(3.0, 0.5, col));
          float colOffset = pseudoNoise(vec2(colSeed * 7.3, floor(uTime * 6.0) + 1.0)) * col * 0.12;
          uv.y += colOffset;

          // 화면 전체 극좌표 붕괴: 중심 방향으로 나선 수렴
          float collapseAngle = slitAngle + col * sin(distToCenter * 8.0 + uTime * 3.0) * 2.5;
          float collapseR = distToCenter * (1.0 - col * 0.35 * smoothstep(0.0, 0.6, distToCenter));
          vec2 collapsedUv = center + vec2(cos(collapseAngle), sin(collapseAngle)) * collapseR;
          uv = mix(uv, collapsedUv, col * 0.55);

          // 시간 스트레칭: 극단적 수평 늘어남 (슬릿스캔 특징적 스트릭)
          float termStreak = sin(uv.y * uResolution.y * 1.4 + uTime * 60.0) * col * 0.08;
          uv.x += termStreak;

          // 빛의 조각 — 섬광 파편이 픽셀 사이를 가르며 날아감
          float shardFreq = mix(20.0, 180.0, col);
          float shard = step(0.97 - col * 0.03, sin(uv.x * shardFreq + uTime * 40.0));
          uv.y += shard * 0.025 * col;
        }
      }

      vec2 aspect = vec2(uResolution.x/uResolution.y,1.0);
      vec2 dir = uv-center;
      vec2 dirA = dir*aspect;
      float dist = length(dirA);
      float ang = atan(dirA.y,dirA.x);
      
      ang += uSwirl*1.6*exp(-dist*3.5)*(1.0+0.1*sin(uTime*2.0));
      vec2 swirled = vec2(cos(ang),sin(ang))*dist;
      float einsteinMelt = smoothstep(110.0,145.0,uLoopTime);
      float r_g = 0.05+uProximity*0.38*(1.0-einsteinMelt*0.5);
      vec3 color;

      if(dist<r_g){
        color = vec3(0.002,0.0,0.005)*(dist/max(r_g, 0.001));
      } else {
        float offset = (r_g*r_g)/max(dist-r_g*0.35, 0.0001);
        vec2 lensedUv = center+normalize(swirled)*offset;
        
        lensedUv = clamp(lensedUv, 0.001, 0.999);
        float ringFactor = smoothstep(r_g*2.0,r_g,dist);
        vec2 ca = normalize(dirA)*ringFactor*(0.003+uProximity*0.015);
        
        float rC = texture2D(tScene, clamp(lensedUv+ca, 0.0, 1.0)).r;
        float gC = texture2D(tScene, lensedUv).g;
        float bC = texture2D(tScene, clamp(lensedUv-ca, 0.0, 1.0)).b;
        color = vec3(rC,gC,bC);

        // --- 슬릿 스캔 활성화 시 색 분열 스펙트럼 수차 초대형 증폭 ---
        if (uSlitScan > 0.01) {
          float hyperCA = uSlitScan * 0.065 * (1.0 + sin(uTime * 5.0) * 0.2);
          color.r = texture2D(tScene, clamp(lensedUv + vec2(hyperCA, hyperCA * 0.3), 0.0, 1.0)).r;
          color.b = texture2D(tScene, clamp(lensedUv - vec2(hyperCA * 0.3, hyperCA), 0.0, 1.0)).b;
        }

        // --- 종말 붕괴: 시간 분열로 인한 스펙트럼 완전 해체 ---
        if (uCollapse > 0.01) {
          // 색 채널이 각각 다른 방향으로 시간 지연되며 분리됨
          float termCA = uCollapse * 0.12 * (1.0 + sin(uTime * 9.0) * 0.35);
          float noiseShift = pseudoNoise(vUv * 380.0 + uTime * 0.3) * uCollapse * 0.06;

          vec2 rDir = vec2(cos(uTime * 0.7), sin(uTime * 1.1)) * termCA;
          vec2 gDir = vec2(cos(uTime * 1.3 + 2.1), sin(uTime * 0.9)) * termCA * 0.5;
          vec2 bDir = vec2(cos(uTime * 1.8 + 4.2), sin(uTime * 1.5)) * termCA;

          color.r = texture2D(tScene, clamp(lensedUv + rDir + noiseShift, 0.0, 1.0)).r;
          color.g = texture2D(tScene, clamp(lensedUv + gDir, 0.0, 1.0)).g;
          color.b = texture2D(tScene, clamp(lensedUv - bDir - noiseShift * 0.5, 0.0, 1.0)).b;

          // 붕괴 단계에서 강렬한 심홍색 플레어 주입
          float flare = pseudoNoise(vUv * 120.0 + uTime * 2.0) * uCollapse * uCollapse;
          color += vec3(flare * 0.6, flare * 0.02, flare * 0.05);
        }

        float pulse = 0.85+0.15*sin(uTime*1.5);
        float ringWidth = mix(34.0,120.0,einsteinMelt);
        float ringFade = 1.0-smoothstep(140.0,145.0,uLoopTime);
        float ring = exp(-pow((dist-r_g*1.02)*ringWidth,2.0))*(0.4+uEinstein*2.5)*pulse*ringFade;
        vec3 ringColor = mix(vec3(1.0,0.35,0.15),vec3(0.4,0.7,1.0),uEinstein);
        color += ringColor*ring;
      }

      float grain = pseudoNoise(uv*uTime)*0.024*(1.0+uProximity*1.5);
      color += vec3(grain);
      vec2 p = vUv-0.5;
      color += vec3(0.008,0.01,0.02)*(1.0-length(p));

      // 붕괴 단계 정적(static) 노이즈 — 화면이 타들어가듯 분해
      if (uCollapse > 0.01) {
        float staticN = pseudoNoise(vUv * uResolution * 0.5 + floor(uTime * 24.0));
        float staticMask = step(1.0 - uCollapse * uCollapse * 0.4, staticN);
        color = mix(color, vec3(staticN * 0.4, 0.0, staticN * 0.02), staticMask * uCollapse * 0.7);
      }

      // 슬릿 스캔 연산 시 시공간 암전 / 붕괴 이후 완전 암흑으로 침강
      float gammaScale = 0.92 - uProximity * 0.08 - uSlitScan * 0.16 - uCollapse * 0.22;
      color = pow(max(color, vec3(0.0)), vec3(gammaScale));

      // 최종 붕괴: 화면 자체가 점진적으로 검게 소멸
      color *= (1.0 - uCollapse * 0.65);

      gl_FragColor = vec4(color,1.0);
    }
  `
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), postMaterial));

const CLUSTERS = 7;
const clusterCenters = [];
for(let c=0;c<CLUSTERS;c++){
  const cr = 7000+Math.random()*9000;
  const ca = Math.random()*Math.PI*2;
  const cb = Math.acos(Math.random()*2-1);
  clusterCenters.push(new THREE.Vector3(
    cr*Math.sin(cb)*Math.cos(ca),
    cr*Math.cos(cb)*0.55,
    cr*Math.sin(cb)*Math.sin(ca)
  ));
}
const nebGeo   = new THREE.BufferGeometry();
const nebPos   = new Float32Array(NEB_COUNT*3);
const nebColor = new Float32Array(NEB_COUNT*3);
const nebSize  = new Float32Array(NEB_COUNT);
for(let i=0;i<NEB_COUNT;i++){
  const c = clusterCenters[i%CLUSTERS];
  const spread = 1500+Math.random()*2600;
  const gx = (Math.random()+Math.random()+Math.random()-1.5)/1.5;
  const gy = (Math.random()+Math.random()+Math.random()-1.5)/1.5;
  const gz = (Math.random()+Math.random()+Math.random()-1.5)/1.5;
  nebPos[i*3]   = c.x+gx*spread;
  nebPos[i*3+1] = c.y+gy*spread*0.55;
  nebPos[i*3+2] = c.z+gz*spread;
  const m = Math.random();
  nebColor[i*3]   = 0.10+m*0.18;
  nebColor[i*3+1] = 0.16+m*0.26;
  nebColor[i*3+2] = 0.42+m*0.45;
  nebSize[i] = 50+Math.random()*170;
}
nebGeo.setAttribute('position', new THREE.BufferAttribute(nebPos,3));
nebGeo.setAttribute('aColor',   new THREE.BufferAttribute(nebColor,3));
nebGeo.setAttribute('aSize',    new THREE.BufferAttribute(nebSize,1));

const nebMaterial = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0}, uPixelRatio:{value:PR}, uOpacity:{value:1} },
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:`
    attribute float aSize; attribute vec3 aColor;
    uniform float uTime,uPixelRatio;
    varying vec3 vColor;
    void main(){
      vec4 mv = modelViewMatrix*vec4(position,1.0);
      gl_Position = projectionMatrix*mv;
      float dist = -mv.z;
      float pulse = 0.9+0.1*sin(uTime*0.15+aSize);
      gl_PointSize = aSize*pulse*uPixelRatio*(1400.0/max(dist,1.0));
      vColor = aColor;
    }
  `,
  fragmentShader:`
    varying vec3 vColor; uniform float uOpacity;
    void main(){
      float d = length(gl_PointCoord-0.5);
      if(d>0.6) discard;
      float halo = exp(-d*3.0);
      gl_FragColor = vec4(vColor*1.2,halo*0.09*uOpacity);
    }
  `
});
scene.add(new THREE.Points(nebGeo, nebMaterial));

const starGeo  = new THREE.BufferGeometry();
const starPos  = new Float32Array(STAR_COUNT*3);
const starSeed = new Float32Array(STAR_COUNT);
for(let i=0;i<STAR_COUNT;i++){
  const r = 18000+Math.random()*45000;
  const a = Math.random()*Math.PI*2;
  const b = Math.acos(Math.random()*2-1);
  starPos[i*3]   = r*Math.sin(b)*Math.cos(a);
  starPos[i*3+1] = r*Math.cos(b);
  starPos[i*3+2] = r*Math.sin(b)*Math.sin(a);
  starSeed[i] = Math.random();
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('aSeed',    new THREE.BufferAttribute(starSeed,1));

const starMaterial = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0}, uPixelRatio:{value:PR} },
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:`
    attribute float aSeed; uniform float uTime,uPixelRatio;
    varying float vAlpha;
    void main(){
      gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0);
      vAlpha = 0.25+0.55*sin(uTime*(0.7+aSeed)+aSeed*30.0);
      gl_PointSize = (0.8+aSeed*1.5)*uPixelRatio;
    }
  `,
  fragmentShader:`
    varying float vAlpha;
    void main(){
      float d = length(gl_PointCoord-0.5);
      if(d>0.5) discard;
      gl_FragColor = vec4(vec3(0.85,0.9,1.0),smoothstep(0.5,0.0,d)*vAlpha);
    }
  `
});
scene.add(new THREE.Points(starGeo, starMaterial));

function diskColor(ratio){
  const stops = [
    [0.00,[1.00,0.97,0.88]],[0.15,[1.00,0.55,0.25]],
    [0.40,[0.78,0.10,0.17]],[0.70,[0.45,0.03,0.07]],[1.00,[0.12,0.02,0.05]]
  ];
  for(let i=0;i<stops.length-1;i++){
    const [r0,c0]=stops[i],[r1,c1]=stops[i+1];
    if(ratio>=r0&&ratio<=r1){
      const f=(ratio-r0)/(r1-r0);
      return [c0[0]+(c1[0]-c0[0])*f,c0[1]+(c1[1]-c0[1])*f,c0[2]+(c1[2]-c0[2])*f];
    }
  }
  return stops[stops.length-1][1];
}
const diskGeo = new THREE.BufferGeometry();
const dPos    = new Float32Array(DISK_COUNT*3);
const dColor  = new Float32Array(DISK_COUNT*3);
const dInfo   = new Float32Array(DISK_COUNT*3);
for(let i=0;i<DISK_COUNT;i++){
  const r = ISCO+Math.pow(Math.random(),1.8)*(DISK_OUTER-ISCO);
  const theta = Math.random()*Math.PI*2;
  const rand  = Math.random();
  const thickness = 3.0+(r-ISCO)*0.05;
  dPos[i*3]=Math.cos(theta)*r; dPos[i*3+1]=(rand-0.5)*thickness; dPos[i*3+2]=Math.sin(theta)*r;
  dInfo[i*3]=r; dInfo[i*3+1]=theta; dInfo[i*3+2]=rand;
  const c=diskColor((r-ISCO)/(DISK_OUTER-ISCO));
  dColor[i*3]=c[0]; dColor[i*3+1]=c[1]; dColor[i*3+2]=c[2];
}
diskGeo.setAttribute('position', new THREE.BufferAttribute(dPos,3));
diskGeo.setAttribute('aColor',   new THREE.BufferAttribute(dColor,3));
diskGeo.setAttribute('aInfo',    new THREE.BufferAttribute(dInfo,3));

const diskMaterial = new THREE.ShaderMaterial({
  uniforms:{
    uTime:{value:0}, uPixelRatio:{value:PR},
    uOpacity:{value:0}, uFrameDrag:{value:0},
    uCameraPos:{value:new THREE.Vector3()}
  },
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:`
    attribute vec3 aInfo,aColor;
    uniform float uTime,uPixelRatio,uFrameDrag;
    uniform vec3 uCameraPos;
    varying vec3 vColor; varying float vDistance,vBeam;
    void main(){
      float r=aInfo.x;
      float omega=900.0/pow(r,1.5);
      float theta=aInfo.y+omega*uTime;
      theta+=uFrameDrag*exp(-r/260.0)*uTime*0.6;
      vec3 p; p.x=cos(theta)*r; p.z=sin(theta)*r; p.y=position.y;
      vec3 velDir=normalize(vec3(-sin(theta),0.0,cos(theta)));
      vec3 worldPos=(modelMatrix*vec4(p,1.0)).xyz;
      vec3 toCam=normalize(uCameraPos-worldPos);
      vBeam=dot(velDir,toCam);
      vColor=aColor;
      vec4 mv=modelViewMatrix*vec4(p,1.0);
      gl_Position=projectionMatrix*mv;
      vDistance=-mv.z;
      gl_PointSize=min(70.0,(1.0+aInfo.z*1.7)*1.3*uPixelRatio*(600.0/max(vDistance,1.0)));
    }
  `,
  fragmentShader:`
    varying vec3 vColor; varying float vDistance,vBeam;
    uniform float uOpacity;
    void main(){
      vec2 pt=gl_PointCoord-0.5; float d=length(pt);
      if(d>0.5) discard;
      float core=smoothstep(0.5,0.0,d);
      float halo=exp(-d*6.0);
      float boost=clamp(1.0+vBeam*1.9,0.12,3.4);
      vec3 shift=mix(vec3(0.5,0.04,0.1),vec3(1.0,0.96,0.88),clamp(vBeam*0.5+0.5,0.0,1.0));
      vec3 col=mix(vColor,shift,0.45)*boost;
      float atten=min(1.0,1300.0/max(vDistance,1.0));
      gl_FragColor=vec4(col*(0.8+halo*1.2),(core*0.24+halo*0.085)*atten*uOpacity);
    }
  `
});
scene.add(new THREE.Points(diskGeo, diskMaterial));

scene.add(new THREE.Mesh(

const jetMaterial = new THREE.MeshBasicMaterial({color:0x99ccff,transparent:true,opacity:0});

jetA.position.y =  4500;

const JET_COLOR_A = new THREE.Color(0x99ccff);
const JET_COLOR_B = new THREE.Color(0xc0152a);

const cathCanvas = document.getElementById('cathedral');
const cctx = cathCanvas.getContext('2d');
function resizeCathedral(){
  cathCanvas.width  = innerWidth;
  cathCanvas.height = innerHeight;
}
resizeCathedral();

function drawCathedral(t, opacity){
  cathCanvas.style.opacity = opacity;
  if(opacity<=0.003) return;
  const w=cathCanvas.width, h=cathCanvas.height;
  const cx=w/2, cy=h/2;
  const maxR=Math.hypot(w,h)*0.62;
  cctx.fillStyle='#000002';
  cctx.fillRect(0,0,w,h);
  const breathe=0.5+0.5*Math.sin(t*0.15);
  const grad=cctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
  grad.addColorStop(0,`rgba(192,21,42,${0.32+0.18*breathe})`);
  grad.addColorStop(0.5,'rgba(60,5,12,0.22)');
  grad.addColorStop(1,'rgba(0,0,2,0)');
  cctx.fillStyle=grad;
  cctx.fillRect(0,0,w,h);
  for(let i=0;i<40;i++){
    const ang=i*0.314+t*0.05;
    const rad=(i*13%(maxR*0.85))+Math.sin(t*0.07+i)*20;
    const px=cx+Math.cos(ang)*rad;
    const py=cy+Math.sin(ang*1.3)*rad*0.6;
    const s=3+(i%5);
    const pg=cctx.createRadialGradient(px,py,0,px,py,s*2);
    pg.addColorStop(0,'rgba(255,235,225,0.5)');
    pg.addColorStop(1,'rgba(255,235,225,0)');
    cctx.fillStyle=pg;
    cctx.fillRect(px-s*2,py-s*2,s*4,s*4);
  }
}

class StableClock {
  constructor(){ this._t=0; this._prev=null; this._maxDelta=0.1; }
  tick(){
    const now = performance.now()/1000;
    if(this._prev===null){ this._prev=now; return 0; }
    const raw = now-this._prev;
    this._prev = now;
    const dt = Math.min(raw, this._maxDelta);
    this._t += dt;
    return dt;
  }
  get elapsed(){ return this._t; }
}
const clock = new StableClock();

const pointer = new THREE.Vector2();
const target  = new THREE.Vector2();
let   isDragging = false;
let   lastPX = 0.5, lastPY = 0.5;

function onPointerMove(e){
  if(e.target.closest('#btn-group')) return;
  const x = e.clientX/innerWidth;
  const y = e.clientY/innerHeight;
  if(isDragging){
    const dx = (x - lastPX)*1.0;
    const dy = (y - lastPY)*0.6;
    target.x = clamp(target.x+dx, -1.5, 1.5);
    target.y = clamp(target.y+dy, -1.0, 1.0);
  } else {
    target.x = (x-0.5)*0.4;
    target.y = (y-0.5)*0.2;
  }
  lastPX = x; lastPY = y;
}
function onPointerDown(e){
  if(e.target.closest('#btn-group')) return;
  isDragging = true;
  lastPX = e.clientX/innerWidth;
  lastPY = e.clientY/innerHeight;
}
function onPointerUp(){ isDragging = false; }

addEventListener('pointermove', onPointerMove, {passive:true});
addEventListener('pointerdown', onPointerDown, {passive:true});
addEventListener('pointerup',   onPointerUp,   {passive:true});
addEventListener('pointercancel', onPointerUp, {passive:true});

const ease = (c,t,a) => c+(t-c)*a;

const flashEl    = document.getElementById('flash');
const phaseKrEl  = document.getElementById('phase-kr');
const descentEl  = document.getElementById('descent-label');
const radiusEl   = document.getElementById('radius-label');
const mathEl     = document.getElementById('math-label');

let lastPhase = -1;
let phaseChangeTimeout = null;

function setPhaseText(text, eqText){
  phaseKrEl.style.opacity = 0;
  clearTimeout(phaseChangeTimeout);
  phaseChangeTimeout = setTimeout(()=>{
    phaseKrEl.textContent = text;
    mathEl.textContent = eqText;
    phaseKrEl.style.opacity = 1;
  }, 400);
}

let rafId = null;

function animate(){
  rafId = requestAnimationFrame(animate);
  clock.tick();
  const t      = clock.elapsed;
  const loopT  = t % CYCLE;
  const x      = effectiveX(loopT);

  pointer.x = ease(pointer.x, target.x, 0.03);
  pointer.y = ease(pointer.y, target.y, 0.03);

  const r      = descentCurve(x);
  const theta  = t*0.022 + pointer.x*0.35;
  const phiBase  = lerp(0.38, 0.05, smoothstep(60,105,x));
  const phiWeave = smoothstep(105,145,x)*Math.sin(t*0.18)*0.45;
  const phi    = phiBase + Math.sin(t*0.025)*0.12 + phiWeave + pointer.y*0.15;

  camera.position.set(
    r*Math.cos(phi)*Math.cos(theta),
    r*Math.sin(phi),
    r*Math.cos(phi)*Math.sin(theta)
  );
  
  camera.lookAt(0,0,0);

  const prox    = proximity(x);
  const sw      = swirl(x);
  const eIntens = einsteinOpacity(x);
  const pIntens = photonOpacity(x);
  const jIntens = jetOpacity(x);
  const nIntens = nebulaOpacity(x);
  const rIntens = ringOpacity(x);
  const drag    = frameDrag(x);
  const flash   = flashPulse(x);
  const overlay = overlayOpacity(loopT);
  const sScan   = slitScanIntensity(x);
  const sCollapse = collapseIntensity(loopT);

  nebMaterial.uniforms.uTime.value    = t;
  nebMaterial.uniforms.uOpacity.value = nIntens;
  starMaterial.uniforms.uTime.value   = t;
  diskMaterial.uniforms.uTime.value   = t;
  diskMaterial.uniforms.uOpacity.value = rIntens;
  diskMaterial.uniforms.uFrameDrag.value = drag;
  diskMaterial.uniforms.uCameraPos.value.copy(camera.position);

  photonRing.material.opacity = pIntens*0.9;
  photonRing.rotation.z = t*0.18;
  einsteinRing.material.opacity = eIntens*0.55;
  einsteinRing.rotation.z = -t*0.06;
  jetMaterial.opacity = jIntens*0.08;
  jetMaterial.color.lerpColors(JET_COLOR_A, JET_COLOR_B, x/145);

  renderer.setRenderTarget(renderTarget);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);

  const screenPos = new THREE.Vector3(0,0,0).project(camera);
  postMaterial.uniforms.uTime.value     = t;
  postMaterial.uniforms.uLoopTime.value = loopT;
  
  let mx = (screenPos.x + 1) * 0.5;
  let my = (screenPos.y + 1) * 0.5;
  
  if(isNaN(mx) || isNaN(my)) { mx = 0.5; my = 0.5; }
  postMaterial.uniforms.uMouse.value.set(mx, my);
  
  postMaterial.uniforms.uProximity.value = prox;
  postMaterial.uniforms.uSwirl.value    = sw;
  postMaterial.uniforms.uEinstein.value = eIntens;
  postMaterial.uniforms.uSlitScan.value = sScan;
  postMaterial.uniforms.uCollapse.value = sCollapse;
  renderer.render(postScene, postCamera);

  drawCathedral(t, overlay);
  SoundEngine.update(loopT, x, soundMuted);

  flashEl.style.opacity = flash*0.55;
  descentEl.textContent = sCollapse > 0.5 ? '∞' : Math.round((x/145)*100)+'%';
  radiusEl.textContent  = sCollapse > 0.8 ? '0.000' : (r/RS).toFixed(2);

  const ph = phaseIndex(loopT);
  if(ph!==lastPhase){ setPhaseText(PHASE_EN[ph], MATH_EQUATIONS[ph]); lastPhase=ph; }
}

let resizeTimer = null;
function onResize(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    renderTarget.setSize(innerWidth, innerHeight);
    postMaterial.uniforms.uResolution.value.set(innerWidth, innerHeight);
    resizeCathedral();
    nebMaterial.uniforms.uPixelRatio.value  = PR;
    starMaterial.uniforms.uPixelRatio.value = PR;
    diskMaterial.uniforms.uPixelRatio.value = PR;
  }, 100);
}
addEventListener('resize', onResize);
addEventListener('orientationchange', ()=>{ setTimeout(onResize, 200); });

document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    cancelAnimationFrame(rafId);
  } else {
    clock._prev = null;
    animate();
  }
});

const SoundEngine = (() => {
  let ctx=null, masterGain=null, running=false;
  let organGain, brassGain1, brassGain2, timpaniGain;
  let organOsc1, organOsc2, brassOsc1, brassOsc2;
  function init(){
    if(ctx) return;
    ctx = new(window.AudioContext||window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0,ctx.currentTime);
    masterGain.connect(ctx.destination);
    organGain = ctx.createGain(); organGain.gain.value=0;
    organOsc1 = ctx.createOscillator(); organOsc1.type='sawtooth'; organOsc1.frequency.value=32.7;
    organOsc2 = ctx.createOscillator(); organOsc2.type='triangle'; organOsc2.frequency.value=65.4;
    const organFilter = ctx.createBiquadFilter();
    organFilter.type='lowpass'; organFilter.frequency.value=90;
    organOsc1.connect(organFilter); organOsc2.connect(organFilter);
    organFilter.connect(organGain); organGain.connect(masterGain);
    organOsc1.start(); organOsc2.start();
    brassGain1=ctx.createGain(); brassGain1.gain.value=0;
    brassOsc1=ctx.createOscillator(); brassOsc1.type='sawtooth'; brassOsc1.frequency.value=130.8;
    const brassFilter1=ctx.createBiquadFilter(); brassFilter1.type='bandpass';
    brassFilter1.frequency.value=400; brassFilter1.Q.value=1.2;
    brassOsc1.connect(brassFilter1); brassFilter1.connect(brassGain1);
    brassGain1.connect(masterGain); brassOsc1.start();
    brassGain2=ctx.createGain(); brassGain2.gain.value=0;
    brassOsc2=ctx.createOscillator(); brassOsc2.type='square'; brassOsc2.frequency.value=196.0;
    const brassFilter2=ctx.createBiquadFilter(); brassFilter2.type='lowpass'; brassFilter2.frequency.value=800;
    brassOsc2.connect(brassFilter2); brassFilter2.connect(brassGain2);
    brassGain2.connect(masterGain); brassOsc2.start();
    timpaniGain=ctx.createGain(); timpaniGain.gain.value=0;
    const timpaniOsc=ctx.createOscillator(); timpaniOsc.type='sine'; timpaniOsc.frequency.value=48;
    const timpaniLFO=ctx.createOscillator(); timpaniLFO.frequency.value=5.5;
    const timpaniLFOg=ctx.createGain(); timpaniLFOg.gain.value=0.4;
    timpaniLFO.connect(timpaniLFOg); timpaniLFOg.connect(timpaniGain.gain);
    timpaniOsc.connect(timpaniGain); timpaniGain.connect(masterGain);
    timpaniOsc.start(); timpaniLFO.start();
  }
  function update(loopT,x,muted){
    if(!ctx||!running||muted) return;
    const now=ctx.currentTime;
    let organVolume=clamp(smoothstep(0,40,x)*0.65,0,0.65);
    organGain.gain.setTargetAtTime(organVolume,now,0.1);
    if(x>=20&&x<85) timpaniGain.gain.setTargetAtTime(0.12*smoothstep(20,50,x),now,0.1);
    if(x>=55&&x<110){
      if(x<75){
        brassOsc1.frequency.setTargetAtTime(130.81,now,0.05);
        brassOsc2.frequency.setTargetAtTime(196.00,now,0.05);
        brassGain1.gain.setTargetAtTime(0.25,now,0.1);
        brassGain2.gain.setTargetAtTime(0.18,now,0.1);
      } else if(x<95){
        brassOsc1.frequency.setTargetAtTime(196.00,now,0.05);
        brassOsc2.frequency.setTargetAtTime(261.63,now,0.05);
        brassGain1.gain.setTargetAtTime(0.32,now,0.1);
        brassGain2.gain.setTargetAtTime(0.22,now,0.1);
      } else {
        brassOsc1.frequency.setTargetAtTime(261.63,now,0.05);
        brassOsc2.frequency.setTargetAtTime(392.00,now,0.05);
        brassGain1.gain.setTargetAtTime(0.40,now,0.1);
        brassGain2.gain.setTargetAtTime(0.28,now,0.1);
      }
      timpaniGain.gain.setTargetAtTime(0.35,now,0.1);
    }
    if(x>=110&&x<=145){
      const intensity=smoothstep(110,145,x);
      brassOsc1.frequency.setTargetAtTime(261.63+intensity*240,now,0.05);
      brassOsc2.frequency.setTargetAtTime(392.00+intensity*350,now,0.05);
      timpaniGain.gain.setTargetAtTime(0.55*(1.0-intensity*0.3),now,0.1);
    }
    // 145~180: 특이점 붕괴 — 주파수가 무한 강하, 오르간이 저주파 드론으로 붕괴
    if(loopT>145.0 && loopT<=180.0){
      const collapseT = (loopT - 145.0) / 35.0; // 0→1
      // 주파수 하강: 빛이 탈출 불능, 음도 무너짐
      const crashFreq1 = 261.63 * Math.pow(0.12, collapseT);
      const crashFreq2 = 392.00 * Math.pow(0.10, collapseT);
      brassOsc1.frequency.setTargetAtTime(Math.max(crashFreq1, 8.0), now, 0.08);
      brassOsc2.frequency.setTargetAtTime(Math.max(crashFreq2, 6.0), now, 0.08);
      // 볼륨은 점차 사라지되 저주파 진동으로만 남음
      const collapseVol = Math.pow(1.0 - collapseT, 1.8);
      brassGain1.gain.setTargetAtTime(0.40 * collapseVol, now, 0.15);
      brassGain2.gain.setTargetAtTime(0.28 * collapseVol, now, 0.15);
      // 팀파니는 슬로우 붐으로 변환
      timpaniGain.gain.setTargetAtTime(0.22 * collapseVol, now, 0.2);
      // 오르간은 중간 지점에서 저주파 드론으로 잠기다 소멸
      const organFinalVol = collapseT < 0.5
        ? 0.65 * (1.0 - collapseT * 0.6)
        : 0.65 * (1.0 - collapseT) * 0.8;
      organGain.gain.setTargetAtTime(Math.max(organFinalVol, 0.0), now, 0.2);
    }
  }
  function start(){
    if(!ctx) init();
    if(ctx.state==='suspended') ctx.resume();
    running=true;
    masterGain.gain.linearRampToValueAtTime(0.35,ctx.currentTime+2.0);
  }
  function stop(){
    if(!ctx) return;
    running=false;
    masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.0);
  }
  return { start, stop, update };
})();

const soundBtn = document.getElementById('sound-btn');
const iconOn   = document.getElementById('icon-on');
const iconOff  = document.getElementById('icon-off');
let soundMuted = true;

soundBtn.addEventListener('click', ()=>{
  soundMuted = !soundMuted;
  iconOn.style.display  = soundMuted ? 'none' : '';
  iconOff.style.display = soundMuted ? ''     : 'none';
  soundMuted ? SoundEngine.stop() : SoundEngine.start();
});

setTimeout(()=>{
  loadingEl.classList.add('fade-out');
  setTimeout(()=>{ loadingEl.style.display='none'; }, 1300);
}, 800);

animate();
