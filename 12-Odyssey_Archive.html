<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Act V, Scene 2.</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block}
#title{position:fixed;top:24px;left:24px;color:rgba(255,255,255,.75);letter-spacing:.25em;font-size:12px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;pointer-events:none;z-index:10;right:120px}
#title span{display:block;font-size:28px;font-weight:200;margin-bottom:6px;color:#fff}
#back-btn{position:fixed;top:24px;right:24px;color:rgba(255,255,255,.5);text-decoration:none;font-size:12px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;letter-spacing:.25em;border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:4px;z-index:10;transition:all .3s ease}
#back-btn:hover{color:rgba(255,255,255,1);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5)}
@media (max-width:640px){#title{top:20px;left:20px;right:100px}#title span{font-size:18px;margin-bottom:4px}#title{font-size:10px;letter-spacing:.15em}#back-btn{top:20px;right:20px;padding:6px 12px;font-size:10px}}
</style>
</head>
<body>
<div id="title">
<span>ODYSSEY: ARCHIVE</span>
R<sub>s</sub> = 2GM / c<sup>2</sup> &nbsp;·&nbsp; Kerr Drift: Δθ ∝ exp(-r/450) &nbsp;·&nbsp; Autonomous Camera Orbit
</div>
<a href="javascript:history.back()" id="back-btn">BACK</a>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,0.00025);
const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.1,120000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const blackHole=new THREE.Mesh(new THREE.SphereGeometry(90,128,128),new THREE.MeshBasicMaterial({color:0x000000}));
scene.add(blackHole);
const photon=new THREE.Mesh(new THREE.TorusGeometry(155,8,32,512),new THREE.MeshBasicMaterial({color:0xfff6d5}));
photon.rotation.x=Math.PI/2;
scene.add(photon);
const einstein=new THREE.Mesh(new THREE.TorusGeometry(260,2,16,512),new THREE.MeshBasicMaterial({color:0x88bbff,transparent:true,opacity:.4}));
einstein.rotation.x=Math.PI/2;
scene.add(einstein);
const jetGeo=new THREE.CylinderGeometry(10,70,12000,16,1,true);
const jetMat=new THREE.MeshBasicMaterial({color:0x99ccff,transparent:true,opacity:.08});
const jetA=new THREE.Mesh(jetGeo,jetMat);
const jetB=new THREE.Mesh(jetGeo,jetMat);
jetA.position.y=6000;
jetB.position.y=-6000;
scene.add(jetA,jetB);
const COUNT=420000;
const pos=new Float32Array(COUNT*3);
const info=new Float32Array(COUNT*3);
for(let i=0;i<COUNT;i++){
let r=180+Math.pow(Math.random(),1.7)*5000;
let a=Math.random()*Math.PI*2;
pos[i*3]=Math.cos(a)*r;
pos[i*3+1]=(Math.random()-0.5)*(r*0.08);
pos[i*3+2]=Math.sin(a)*r;
info[i*3]=r;
info[i*3+1]=a;
info[i*3+2]=Math.random();
}
const geo=new THREE.BufferGeometry();
geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
geo.setAttribute("aInfo",new THREE.BufferAttribute(info,3));
const mat=new THREE.ShaderMaterial({
transparent:true,
depthWrite:false,
blending:THREE.AdditiveBlending,
uniforms:{uTime:{value:0}},
vertexShader:`
attribute vec3 aInfo;
uniform float uTime;
varying vec3 vColor;
void main(){
float r=aInfo.x;
float theta=aInfo.y+(35.0/r)*uTime;
float drag=exp(-r/450.0);
theta+=drag*uTime*0.8;
vec3 p;
p.x=cos(theta)*r;
p.z=sin(theta)*r;
p.y=sin(theta*5.0+aInfo.z*20.0)*r*0.02;
if(r<450.0) vColor=vec3(1.0,0.98,0.90);
else if(r<1800.0) vColor=vec3(1.0,0.42,0.08);
else vColor=vec3(0.15,0.45,1.0);
vec4 mv=modelViewMatrix*vec4(p,1.0);
gl_Position=projectionMatrix*mv;
gl_PointSize=max(1.0,4200.0/(-mv.z));
}
`,
fragmentShader:`
varying vec3 vColor;
void main(){
float d=length(gl_PointCoord-0.5);
if(d>0.5) discard;
float a=smoothstep(.5,.0,d);
gl_FragColor=vec4(vColor,a*0.85);
}
`
});
scene.add(new THREE.Points(geo,mat));
const nebula=new THREE.Mesh(new THREE.SphereGeometry(9000,64,64),new THREE.MeshBasicMaterial({color:0x223366,transparent:true,opacity:0.03,side:THREE.BackSide}));
scene.add(nebula);
const starsGeo=new THREE.BufferGeometry();
const starCount=90000;
const s=new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
let r=18000+Math.random()*50000;
let a=Math.random()*Math.PI*2;
let b=Math.acos(Math.random()*2-1);
s[i*3]=r*Math.sin(b)*Math.cos(a);
s[i*3+1]=r*Math.cos(b);
s[i*3+2]=r*Math.sin(b)*Math.sin(a);
}
starsGeo.setAttribute("position",new THREE.BufferAttribute(s,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({size:2,color:0xffffff})));
const clock=new THREE.Clock();
function animate(){
requestAnimationFrame(animate);
const t=clock.getElapsedTime();
mat.uniforms.uTime.value=t;
photon.rotation.z=t*0.7;
einstein.rotation.z=-t*0.2;
const radius=900+Math.sin(t*0.06)*700;
const ang=t*0.18;
camera.position.set(Math.cos(ang)*radius,Math.sin(t*0.14)*180,Math.sin(ang)*radius);
camera.lookAt(Math.cos(t*0.35)*30,Math.sin(t*0.22)*10,Math.sin(t*0.35)*30);
renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
