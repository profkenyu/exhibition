<script type="module">
import * as THREE from 'three';
window.__THREE_OK=1;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,20,80);

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    powerPreference:"high-performance"
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

function J0(x){
    const ax=Math.abs(x);
    if(ax<3){
        const y=x*x;
        return 1-y/4+y*y/64-y*y*y/2304+y*y*y*y/147456;
    }
    return Math.sqrt(2/(Math.PI*ax))*Math.cos(ax-Math.PI/4);
}

let t=0;
const smoothstep01=x=>{x=Math.min(1,Math.max(0,x));return x*x*(3-2*x);};
const MAX_CENTERS=12;
const centers=[];

function addCenter(x,y,life){
    centers.push({
        x:x,
        y:y,
        life:(life===undefined?1:life),
        birth:t,
        amp:0,
        phase:Math.random()*100
    });
    if(centers.length>MAX_CENTERS){
        centers.shift();
    }
}

for(let i=0;i<4;i++){
    addCenter((Math.random()-0.5)*30, (Math.random()-0.5)*30, 0.55+Math.random()*0.35);
}

const glowTex=(()=>{
    const cv=document.createElement('canvas'); cv.width=cv.height=64;
    const g=cv.getContext('2d');
    const rg=g.createRadialGradient(32,32,0,32,32,32);
    rg.addColorStop(0,'rgba(255,255,255,1)');
    rg.addColorStop(0.3,'rgba(190,230,255,0.5)');
    rg.addColorStop(1,'rgba(120,180,255,0)');
    g.fillStyle=rg; g.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(cv);
})();
const glows=[];
function rebuildGlows(){
    glows.forEach(s=>scene.remove(s));
    glows.length=0;
    for(let c of centers){
        const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
        sp.position.set(c.x,c.y,0);
        scene.add(sp);
        glows.push(sp);
    }
}
rebuildGlows();

const rings=[];
const ringGeo=new THREE.RingGeometry(0.9,1.0,64);
function spawnRing(x,y){
    const m=new THREE.Mesh(ringGeo,new THREE.MeshBasicMaterial({color:0xbfe4ff,transparent:true,opacity:0.75,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
    m.position.set(x,y,0.5);
    rings.push(m); scene.add(m);
}

const COUNT=LOWP?7000:12000;
const positions=new Float32Array(COUNT*3);
const colors=new Float32Array(COUNT*3);
const base=[];

for(let i=0;i<COUNT;i++){
    const r= Math.random()*40;
    const th= Math.random()*Math.PI*2;
    const x= Math.cos(th)*r;
    const y= Math.sin(th)*r;
    base.push({x,y});
    positions[i*3]=x;
    positions[i*3+1]=y;
    positions[i*3+2]=0;
}

const geo=new THREE.BufferGeometry();
geo.setAttribute("position", new THREE.BufferAttribute(positions,3));
geo.setAttribute("color", new THREE.BufferAttribute(colors,3));

const mat=new THREE.PointsMaterial({
    size:0.45,
    vertexColors:true,
    transparent:true,
    opacity:.9,
    blending: THREE.AdditiveBlending
});

const cloud=new THREE.Points(geo, mat);
scene.add(cloud);

window.addEventListener("pointerdown", e=>{
    if(e.target.id === 'back-btn' || e.target.id === 'next-btn') return;
    const x=(e.clientX/window.innerWidth-.5)*60;
    const y=-(e.clientY/window.innerHeight-.5)*60;
    addCenter(x,y);
    rebuildGlows();
    spawnRing(x,y);
});

function animate(){
    requestAnimationFrame(animate);
    t+=0.01;

    let fieldEnergy=0;
    for(let c of centers){
        c.phase+=0.003;
        c.x+=Math.sin(c.phase*0.7)*0.015;
        c.y+=Math.cos(c.phase*0.5)*0.015;
        c.life*=0.9994;
        c.amp=smoothstep01((t-c.birth)/0.9)*c.life;
        fieldEnergy+=c.amp;
    }

    if(fieldEnergy<0.06){
        addCenter((Math.random()-0.5)*36,(Math.random()-0.5)*36,0.5);
        rebuildGlows();
    }
    for(let i=0;i<glows.length;i++){
        const c=centers[i];
        glows[i].position.set(c.x,c.y,0);
        const gs=(2.0+0.7*Math.sin(t*2.0+c.phase))*Math.max(0.001,c.amp)*3.2;
        glows[i].scale.set(gs,gs,1);
        glows[i].material.opacity=0.85*c.amp;
    }
    for(let i=rings.length-1;i>=0;i--){
        const rg=rings[i];
        const ns=rg.scale.x+0.45+rg.scale.x*0.02;
        rg.scale.set(ns,ns,1);
        rg.material.opacity*=0.94;
        if(rg.material.opacity<0.02){scene.remove(rg);rings.splice(i,1);}
    }

    const pos=geo.attributes.position.array;
    const col=geo.attributes.color.array;

    for(let i=0;i<COUNT;i++){
        const p=base[i];
        let h=0;
        for(let c of centers){
            const dx=p.x-c.x;
            const dy=p.y-c.y;
            const d=Math.sqrt(dx*dx+dy*dy);
            h+=J0(d*0.7-t*3)*c.amp;
        }
        pos[i*3+2]=h*4;

        const a=Math.sin(h*0.35+t*0.25);
        const b=Math.sin(h*0.6+t*0.18);
        const cc=Math.sin(h*0.15+t*0.35);

        let cr=0.10+0.20*(a+1)*0.5;
        let cg=0.35+0.65*(b+1)*0.5;
        let cb=0.55+0.45*(cc+1)*0.5;

        const crest=Math.min(1,Math.max(0,(h-1.7)*0.5));
        cr+=(1.00-cr)*crest;
        cg+=(0.72-cg)*crest*0.9;
        cb+=(0.85-cb)*crest*0.8;
        col[i*3]=cr; col[i*3+1]=cg; col[i*3+2]=cb;
    }

    geo.attributes.position.needsUpdate=true;
    geo.attributes.color.needsUpdate=true;

    camera.position.x=Math.cos(t*0.05)*75;
    camera.position.z=Math.sin(t*0.05)*75;
    camera.position.y=18+Math.sin(t*0.03)*10;
    camera.lookAt(0,0,0);

    cloud.rotation.z+=0.0006;
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", ()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
