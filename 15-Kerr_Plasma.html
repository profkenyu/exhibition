const vertex=`attribute vec2 position;void main(){gl_Position=vec4(position,0.0,1.0);}`,
fragment=`precision highp float;
uniform vec2 resolution;uniform float time;uniform vec2 mouse;
uniform float u_bass;
uniform float u_treble;
uniform float u_wake;
uniform float u_spin;
uniform float u_fin;
#define PI 3.14159265359
#define MAX_STEPS 90
#define STEP_SIZE 0.06
#define VOLUME_STEPS 28
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1.0,0.0)),c=hash(i+vec2(0.0,1.0)),d=hash(i+vec2(1.0,1.0));vec2 u=f*f*(3.0-2.0*f);return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;}
float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<4;i++){v+=noise(p)*a;p*=2.0;a*=0.5;}return v;}
mat2 rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
vec3 integrateRay(vec3 ro,vec3 rd, out float outR){vec3 pos=ro,dir=rd;float rs=1.15*(1.0-0.9*u_fin);for(int i=0;i<MAX_STEPS;i++){float r=max(length(pos),0.24),gravity=rs/(r*r+0.22);vec3 gravDir=normalize(-pos),frameDrag=normalize(cross(vec3(0.0,1.0,0.0),pos)+0.0001);float damp=smoothstep(0.0,3.0,r);dir+=gravDir*gravity*STEP_SIZE*damp+frameDrag*gravity*u_spin*0.18*damp;dir=normalize(dir);pos+=dir*STEP_SIZE;}outR=length(pos);return pos;}
float dotStars(vec2 uv,vec2 drift){vec2 gv=fract(uv*120.0+drift)-0.5,id=floor(uv*120.0+drift);float rnd=hash(id),size=mix(0.003,0.018,rnd);return smoothstep(size,size*0.2,length(gv))*step(0.992,rnd);}
void main(){
vec2 uv=(gl_FragCoord.xy*2.0-resolution)/min(resolution.x,resolution.y);
float distFromCenter=length(uv);
float chromaticAberration=0.012*smoothstep(0.1,1.5,distFromCenter)*(0.25+0.75*u_wake);
vec2 drift=vec2(time*0.08+mouse.x*2.0,time*0.04+mouse.y*2.0);
float camAngleX=time*0.05+mouse.x*3.5,camAngleY=mouse.y*1.2;
vec3 ro=vec3(0.0,0.0,-5.8);ro.yz*=rot(camAngleY);ro.xz*=rot(camAngleX);
vec3 target=vec3(0.0,0.0,0.0),forward=normalize(target-ro),right=normalize(cross(vec3(0.0,1.0,0.0),forward)),up=cross(forward,right);
/* Kerr geometry (geometric units, M scaled so rs=2M=1.15 scene units) */
float ms=1.0-0.9*u_fin;                                             /* Hawking mass loss */
float M=0.575*ms;
float a=clamp(u_spin,-0.998,0.998);                                  /* Thorne limit */
float rH=M*(1.0+sqrt(max(1.0-a*a,0.0)));                             /* r+ = M+sqrt(M^2-a^2) */
float rpro=2.0*M*(1.0+cos(0.6666667*acos(clamp(-a,-1.0,1.0))));      /* Bardeen 1972 */
float rret=2.0*M*(1.0+cos(0.6666667*acos(clamp(a,-1.0,1.0))));
/* single geodesic integration; chromatic aberration on star layer only */
vec3 rd=normalize(right*uv.x+up*uv.y+forward*1.75);
float r;vec3 p=integrateRay(ro,rd,r);
vec3 starLayer=vec3(0.0);
for(int c=0;c<3;c++){float shift=(float(c)-1.0)*chromaticAberration;vec2 suv=uv*(1.0+shift);float s=dotStars(suv*1.5,drift)+dotStars(suv*0.8+10.0,drift*0.4);vec3 scol=mix(vec3(0.6,0.75,1.0),vec3(1.0,0.92,0.82),fbm(suv*4.0))*s*1.8;if(c==0)starLayer.r=scol.r;else if(c==1)starLayer.g=scol.g;else starLayer.b=scol.b;}
vec3 sceneColor=starLayer;
float phi=atan(p.z,p.x);
float diskR=2.5*mix(1.0,0.45,u_fin);
float disk=exp(-abs(p.y)*15.0)*exp(-abs(length(p.xz)-diskR)*2.2)*fbm(p.xz*3.5+time*0.04);
vec3 diskColor=mix(vec3(0.15,0.35,1.0),vec3(1.0,0.5,0.08),disk);
diskColor.r*=1.0+smoothstep(-1.0,1.0,p.x)*1.8;diskColor.b*=1.2-smoothstep(-1.0,1.0,p.x)*0.7;
sceneColor+=diskColor*disk*2.3;
/* asymmetric photon ring: prograde/retrograde orbits */
float ringR=mix(rpro,rret,0.5+0.5*cos(phi));
sceneColor+=vec3(1.0,0.95,0.91)*exp(-abs(r-ringR)*14.0)*(1.0+sin(phi*14.0-time*(1.4+u_treble*2.5))*0.45)*(3.0+u_treble*4.5)*(1.0+u_fin*5.0);
float filament=sin(phi*18.0-time*(2.0+u_bass*3.5)+fbm(p.xz*(4.0+u_bass*5.0))*4.0);
filament=smoothstep(0.65,1.0,filament)*exp(-abs(r-2.0*ms)*7.0)*fbm(p.xz*8.0+time*0.15);
sceneColor+=mix(vec3(0.2,0.5,1.0),vec3(1.0,0.45,0.08),filament)*filament*(1.8+u_bass*2.0);
/* volumetric fog + ergosphere membrane r_E(th)=M(1+sqrt(1-a^2 cos^2 th)) */
float t=0.0,transmittance=1.0;
for(int i=0;i<VOLUME_STEPS;i++){vec3 vp=ro+rd*t;float vr=max(length(vp),0.001);float density=exp(-abs(vr-2.1)*3.0)*fbm(vp.xz*3.0+time*0.04)*0.12;sceneColor+=mix(vec3(0.2,0.4,1.0),vec3(1.0,0.55,0.15),density*4.0)*density*transmittance;float ct=vp.y/vr;float rE=M*(1.0+sqrt(max(1.0-a*a*ct*ct,0.0)));float membrane=exp(-abs(vr-rE)*24.0)*(0.55+0.45*sin(atan(vp.z,vp.x)*6.0+time*0.9))*abs(a);sceneColor+=vec3(0.75,0.08,0.16)*membrane*0.38*transmittance*u_wake;transmittance*=exp(-density*0.18);t+=0.17;}

sceneColor*=1.0-smoothstep(rH*1.35,rH*0.95,r)*0.68;
sceneColor+=vec3(0.015,0.02,0.04)*smoothstep(rH*1.35,rH*0.95,r);

finalColor=finalColor*1.0675*smoothstep(1.6,0.18,distFromCenter);
finalColor=finalColor/(1.0+finalColor);
finalColor*=1.0-smoothstep(0.82,1.0,u_fin);                          /* evaporation blackout */
gl_FragColor=vec4(pow(finalColor,vec3(0.88)),1.0);}`;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    const bufferLength = analyser.frequencyBinCount;

    const baseOsc1 = audioCtx.createOscillator();
    const baseOsc2 = audioCtx.createOscillator();
    const subOsc = audioCtx.createOscillator();
    const filter = audioCtx.createBiquadFilter();
    const mainGain = audioCtx.createGain();
    mainGainNode = mainGain;
    oscA = baseOsc1; oscB = baseOsc2; oscSub = subOsc; filterNode = filter;

    baseOsc1.type = 'sawtooth'; baseOsc1.frequency.setValueAtTime(55, audioCtx.currentTime);
    baseOsc2.type = 'square'; baseOsc2.frequency.setValueAtTime(55.3, audioCtx.currentTime);
    subOsc.type = 'sine'; subOsc.frequency.setValueAtTime(27.5, audioCtx.currentTime);

    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.type = 'sine'; lfo.frequency.setValueAtTime(0.2, audioCtx.currentTime);
    lfoGain.gain.setValueAtTime(15, audioCtx.currentTime);

    filter.type = 'lowpass';
    filter.Q.setValueAtTime(4, audioCtx.currentTime);
    filter.frequency.setValueAtTime(140, audioCtx.currentTime);

    mainGain.gain.setValueAtTime(0.45, audioCtx.currentTime);

    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    baseOsc1.connect(filter);
    baseOsc2.connect(filter);
    subOsc.connect(mainGain);
    filter.connect(mainGain);

    mainGain.connect(analyser);
    analyser.connect(audioCtx.destination);

    baseOsc1.start(); baseOsc2.start(); subOsc.start(); lfo.start();
}

audioBtn.addEventListener("click", () => {

const smoothJS=(a,b,x)=>{x=Math.max(0,Math.min(1,(x-a)/(b-a)));return x*x*(3-2*x)};
document.addEventListener("click",function(e){
    var el=e.target.closest?e.target.closest("#fin-btn"):null;
    if(!el)return;
    e.preventDefault();e.stopImmediatePropagation();
    if(finActive)return;
    finActive=true;finT0=performance.now();
    if(!audioCtx){initAudio();isAudioPlaying=true;audioBtn.textContent="AUDIO INPUT: ON";audioBtn.classList.add("active");}
    else if(!isAudioPlaying){audioCtx.resume();isAudioPlaying=true;audioBtn.textContent="AUDIO INPUT: ON";audioBtn.classList.add("active");}
},true);

let smoothBass = 0.0, smoothTreble = 0.0;

function render(t){
    if(!isDragging){velocityX*=friction;targetX+=velocityX}
    else lastInput=performance.now();
    if(finActive)lastInput=performance.now();
    currentX+=(targetX-currentX)*0.05;
    currentY+=(targetY-currentY)*0.05;

    const dt=Math.min(t-lastFrameT,100);lastFrameT=t;
    const asleep=(performance.now()-lastInput)>IDLE_DELAY;
    const tau=asleep?18000:2200;
    wake+=((asleep?0:1)-wake)*Math.min(1,dt/tau);
    shaderTime+=dt*0.001*(0.12+0.88*wake);
    sleepNote.style.opacity=wake<0.35?((0.35-wake)/0.35*0.65).toFixed(3):0;
    if(mainGainNode&&!finActive)mainGainNode.gain.value=0.45*(0.04+0.96*wake);

    spinTarget+=(SPIN_REST-spinTarget)*Math.min(1,dt/12000);
    spinCurrent+=(spinTarget-spinCurrent)*0.05;
    if(!finActive&&oscB&&isAudioPlaying)oscB.frequency.value=55.15+Math.abs(spinCurrent)*1.2;

    let uFin=0;
    if(finActive){
        uFin=Math.min(1,(performance.now()-finT0)/FIN_DUR);
        const mLoss=1-0.9*uFin;
        if(audioCtx&&isAudioPlaying){
            if(oscA)oscA.frequency.value=55/mLoss;
            if(oscB)oscB.frequency.value=(55.3+Math.abs(spinCurrent)*1.2)/mLoss;
            if(oscSub)oscSub.frequency.value=27.5/mLoss;
            if(filterNode)filterNode.frequency.value=140+uFin*uFin*5200;
            if(mainGainNode)mainGainNode.gain.value=0.45*(1-smoothJS(0.86,1,uFin));
        }
        if(uFin>=1&&!finDone){finDone=true;var dep=document.getElementById("depart");if(dep)dep.style.opacity="1";setTimeout(function(){location.href="index.html#coda";},900);}
    }

    if(isAudioPlaying && analyser) {
        analyser.getByteFrequencyData(dataArray);

        let bassSum = 0;
        for(let i = 1; i <= 12; i++) { bassSum += dataArray[i]; }
        let currentBass = (bassSum / 12) / 255.0;
        smoothBass = smoothBass * 0.88 + currentBass * 0.12;

        let trebleSum = 0;
        for(let i = 60; i <= 150; i++) { trebleSum += dataArray[i]; }
        let currentTreble = (trebleSum / 90) / 255.0;
        smoothTreble = smoothTreble * 0.85 + currentTreble * 0.15;
    } else {

        smoothBass = 0.04 + Math.sin(t * 0.002) * 0.02;
        smoothTreble = 0.02 + Math.cos(t * 0.003) * 0.01;
    }

    gl.uniform2f(resolutionLoc,canvas.width,canvas.height);
    gl.uniform1f(timeLoc,shaderTime);
    gl.uniform2f(mouseLoc,currentX,currentY);

    gl.uniform1f(bassLoc, smoothBass * 2.2 * (0.2 + 0.8 * wake));
    gl.uniform1f(trebleLoc, smoothTreble * 3.5 * (0.2 + 0.8 * wake));
    gl.uniform1f(wakeLoc, wake);
    gl.uniform1f(spinLoc, spinCurrent);
    gl.uniform1f(finLoc, uFin);

    gl.drawArrays(gl.TRIANGLES,0,6);
    requestAnimationFrame(render);
}
render(0);
</script>
