<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026: A DIGITAL ODYSSEY — 심연의 방정식</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#020305;
    --fg:#f3f5f8;
    --muted:#95a0b2;
    --line:rgba(255,255,255,.08);
    --accent:#91c8ff;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{
    width:100%; height:100%;
    overflow:hidden;
    background:black;
    color:var(--fg);
    font-family:'Inter','Noto Sans KR',sans-serif;
}
canvas{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:0;
}
#museum{
    position:relative; z-index:2;
    width:100%; height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
}
#museum::-webkit-scrollbar{ display:none; }
.scene{
    position:relative;
    width:100%; height:100vh;
    scroll-snap-align:start;
    display:flex; align-items:flex-end;
    padding:clamp(30px,7vw,120px);
}
.scene::before{
    content:"";
    position:absolute; inset:0;
    background:
        radial-gradient(circle at center, rgba(80,120,255,.12), transparent 50%),
        linear-gradient(to top, rgba(0,0,0,.92), rgba(0,0,0,.3));
    z-index:0;
}
.content{
    position:relative; z-index:3;
    max-width:780px;
}
.scene-id{
    color:var(--accent);
    font-size:12px; letter-spacing:.28em;
    margin-bottom:16px; text-transform:uppercase;
}
h1{
    font-size:clamp(40px,6vw,90px);
    line-height:1.02; font-weight:300; letter-spacing:-.04em;
}
.poetic{
    margin-top:24px;
    font-size:clamp(18px,2vw,30px);
    line-height:1.7; font-weight:300;
}
.desc{
    margin-top:26px; color:#adb7c7;
    line-height:1.95; max-width:620px;
    font-size:clamp(13px,1vw,16px);
}
.meta{
    margin-top:32px; display:flex;
    flex-wrap:wrap; gap:10px;
}
.tag{
    padding:9px 12px;
    border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.03);
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
}
.enter{
    margin-top:42px;
    display:inline-flex; align-items:center; gap:12px;
    color:white; text-decoration:none;
    font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    cursor:pointer;
}
.enter::after{ content:"→"; transition:transform .4s ease; }
.enter:hover::after{ transform:translateX(8px); }
#transition-layer{
    position:fixed; inset:0;
    background:black; opacity:0;
    pointer-events:none; z-index:9999;
    transition:opacity 1s ease;
}
#transition-layer.active{ opacity:1; pointer-events:all; }
#title-ui{
    position:fixed; top:22px; left:26px;
    z-index:500; font-size:11px;
    color:rgba(255,255,255,.55);
    letter-spacing:.22em; text-transform:uppercase;
    pointer-events:none;
}
#fixed-top-right{
    position:fixed; top:22px; right:26px;
    z-index:99999; pointer-events:auto;
}
#all-works-btn{
    font-size:11px;
    color:rgba(255,255,255,.85);
    letter-spacing:.22em; text-transform:uppercase;
    text-decoration:none;
    border:1px solid rgba(255,255,255,.35);
    padding:9px 20px;
    background:rgba(2,3,5,0.9);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    transition:all .25s ease-in-out;
    display:inline-block;
    font-weight:500;
}
#all-works-btn:hover{
    color:black;
    border-color:white;
    background:white;
}
#progress{
    position:fixed; top:0; left:0;
    width:2px; height:0;
    background:white; z-index:502;
    transition:height .3s ease;
}
#nav-dots{
    position:fixed; right:24px; top:50%;
    transform:translateY(-50%);
    z-index:500; display:flex;
    flex-direction:column; gap:14px;
}
.dot{
    width:10px; height:10px; border-radius:50%;
    background:rgba(255,255,255,.18);
    transition:all .4s ease; cursor:pointer;
}
.dot.active{ background:white; transform:scale(1.7); }
#opening{
    position:fixed; inset:0;
    background:black; z-index:88888;
    display:flex; align-items:center; justify-content:center;
    transition:opacity 2s ease;
}
#opening.hidden{ opacity:0; pointer-events:none; }
.open-inner{ text-align:center; }
.open-inner h2{
    font-size:clamp(40px,7vw,100px);
    font-weight:300; line-height:1.06; letter-spacing:.08em;
}
.open-inner .subtitle{
    margin-top:16px;
    color:rgba(255,255,255,.35);
    letter-spacing:.2em; font-size:13px;
}
.open-inner p{
    margin-top:26px; color:rgba(255,255,255,.5);
    letter-spacing:.3em; text-transform:uppercase; font-size:12px;
}
#enterBtn{
    margin-top:60px; padding:14px 28px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15);
    color:white; cursor:pointer;
    letter-spacing:.24em; text-transform:uppercase;
    transition:all .4s ease;
    font-size:12px; font-family:'Inter','Noto Sans KR',sans-serif;
}
#enterBtn:hover{ background:white; color:black; }
@media(max-width:768px){
    .scene{ align-items:center; padding:36px; }
    h1{ font-size:44px; }
    .poetic{ font-size:18px; }
    #nav-dots{ display:none; }
    #fixed-top-right{ top:16px; right:16px; }
    #all-works-btn{ padding:7px 14px; font-size:10px; }
}
</style>
</head>
<body>

<canvas id="space"></canvas>

<div id="opening">
    <div class="open-inner">
        <h2>2026:<br>A DIGITAL ODYSSEY</h2>
        <div class="subtitle">심연의 방정식 / Equations of the Abyss</div>
        <p>Kim Gunwoo — 19th Solo Exhibition</p>
        <button id="enterBtn">ENTER THE ABYSS</button>
    </div>
</div>

<div id="transition-layer"></div>

<div id="title-ui">2026: A DIGITAL ODYSSEY — 심연의 방정식</div>

<div id="progress"></div>
<div id="nav-dots"></div>
<div id="museum"></div>

<div id="fixed-top-right">
    <a href="all/index.html" id="all-works-btn">All works</a>
</div>

<script>
const works = [
  { id:"Freeshow.",        title:"RGB Galaxy Engine",         poetic:"우주는 하나의 빛에서 시작된다.",             desc:"세 개의 나선 팔이 회전하며 형성하는 실시간 은하 시뮬레이션. r = √i×1.6 · θ = i×0.013 + arm×2π/3",               file:"01-Freeshow.html",          tags:["Galaxy","WebGL","GLSL Bloom"] },
  { id:"Prologue.",        title:"Hyperbolic Nebula",         poetic:"성운은 계산되는 안개이다.",                   desc:"분형 브라운 운동 기반의 실시간 성운 생성 시스템. z = sinh(u)·cosh(v) − tanh(r)",                               file:"02-Prologue.html",          tags:["fBm","Nebula","GLSL"] },
  { id:"Act I, Scene 1.",  title:"Riemann Dreams",            poetic:"증명되지 않은 우주가 흔들린다.",              desc:"리만 제타 함수 기반 입자 중력 인터랙션. θ = i×0.045 + sin(p)×2 · r = √i×0.55 + p×0.08",                      file:"03-Riemann_dream.html",     tags:["Riemann","Prime","Interactive"] },
  { id:"Act I, Scene 2.",  title:"Quantum Singularity",       poetic:"특이점은 중심이 아니라 붕괴이다.",            desc:"황금각 기반 입자 공간과 비선형 시간 왜곡 구조. θ = p·2π/137.507 · r = √p×12",                                file:"04-Quantum_sing.html",      tags:["Singularity","Fermat","Quantum"] },
  { id:"Act II.",          title:"Dual Galaxy",               poetic:"두 개의 중력장이 서로를 뒤틀기 시작한다.",   desc:"쌍성계 기반 이중 은하 충돌 시뮬레이션. r = √i · θ = i×0.013 + arm×2π/2",                                     file:"05-Dual_Galaxy.html",       tags:["Binary","Orbit","Blackhole"] },
  { id:"Act III, Scene 1.",title:"Lambert Nebula: Essential", poetic:"빛은 회전하면서 확산된다.",                   desc:"Lambert W 함수 기반 광학 성운 구조. W₀(x) · FogExp2(density=0.0025)",                                         file:"06-Lambert_Essential.html", tags:["Lambert W","Optics","Nebula"] },
  { id:"Act III, Scene 2.",title:"Lambert Nebula: Archive",   poetic:"가산되는 빛은 심연이 된다.",                  desc:"W₀ × W₋₁ 이중 분지 기반 아카이브 우주 구조. Additive Blending · Core Pulse",                                  file:"07-Lambert_Archive.html",   tags:["W₀ × W₋₁","Archive","Light"] },
  { id:"Act III, Scene 3.",title:"Lambert Nebula",            poetic:"사운드는 공간을 조각한다.",                   desc:"Web Audio API 기반 오디오 반응형 우주 시스템. W₀(x) ∪ W₋₁(x) · Microphone Input",                           file:"08-Lambert_nebu.html",      tags:["Audio","Reactive","WebAudio"] },
  { id:"Act IV, Scene 1.", title:"Bessel Bloom",              poetic:"파동은 충돌하며 꽃처럼 피어난다.",           desc:"베셀 함수 기반 파동 간섭 구조. J₀(x) ≈ √(2/πx)·cos(x−π/4) · z = Σ J₀(dₙ·0.7 − 3t)",                     file:"09-Bessel_bloom.html",      tags:["Wave","Bessel","Interference"] },
  { id:"Act IV, Scene 2.", title:"Lorenz Butterfly",          poetic:"카오스는 질서의 또 다른 이름이다.",          desc:"Lorenz attractor 기반 카오스 시뮬레이션. ẋ = σ(y−x) · ẏ = x(ρ−z)−y · ż = xy−βz",                        file:"10-Lorenz_butt.html",       tags:["Chaos","Lorenz","Attractor"] },
  { id:"Act V, Scene 1.",  title:"Odyssey: Essential",        poetic:"별들은 관측자의 시점을 따라 이동한다.",       desc:"케플러 궤도 기반 블랙홀 강착 원반 시뮬레이션. v(r) = 35.0/r · Photon Ring",                                   file:"11-Odyssey_Essential.html", tags:["Odyssey","Keplerian","Blackhole"] },
  { id:"Act V, Scene 2.",  title:"Odyssey: Archive",          poetic:"기억된 우주가 끝없이 확장된다.",              desc:"슈바르츠실트-커 혼합 계량 기반 420,000 particle 우주 공간. MRs = 2GM/c²",                                     file:"12-Odyssey_Archive.html",   tags:["Schwarzschild","Kerr","Particles"] },
  { id:"Act V, Scene 3.",  title:"Event Horizon",             poetic:"빛조차 돌아오지 못하는 경계.",               desc:"케플러 회전 및 중력 렌즈 왜곡 기반 블랙홀 구조. ω ∝ r⁻³ᐟ² · Drag to Drift Gaze",                          file:"13-Event_Horizon.html",     tags:["Blackhole","Relativity","Lensing"] },
  { id:"Act VI.",          title:"Black Hole Voyage",         poetic:"붕괴는 가장 거대한 음악이다.",               desc:"오디오 반응형 블랙홀 여덟 악장 붕괴 시뮬레이션. WebGL Raymarching · RK4 Geodesic",                            file:"14-Black_Voyage.html",      tags:["Audio","Collapse","Voyage"] },
  { id:"Epilogue.",        title:"Kerr Plasma Cathedral",     poetic:"모든 입자는 결국 침묵 속으로 사라진다.",     desc:"Kerr 계량 기반 플라즈마 레이마칭 에필로그. ds² = −(1−rs/ρ²)dt² + 포톤 링 필라멘트",                          file:"15-Epilogue.html",          tags:["Kerr","Plasma","Epilogue"] }
];

const hasEntered = sessionStorage.getItem('odyssey_entered');
const opening    = document.getElementById('opening');

if (hasEntered) {
    opening.style.transition = 'none';
    opening.classList.add('hidden');
}

document.getElementById('enterBtn').addEventListener('click', () => {
    sessionStorage.setItem('odyssey_entered', '1');
    opening.classList.add('hidden');
});

const museum  = document.getElementById('museum');
const navDots = document.getElementById('nav-dots');

works.forEach((w, index) => {
    const section = document.createElement('section');
    section.className = 'scene';
    section.innerHTML = `
        <div class="content">
            <div class="scene-id">${w.id}</div>
            <h1>${w.title}</h1>
            <div class="poetic">${w.poetic}</div>
            <div class="desc">${w.desc}</div>
            <div class="meta">
                ${w.tags.map(t => `<div class="tag">${t}</div>`).join('')}
            </div>
            <a href="${w.file}" class="enter" data-index="${index}" data-file="${w.file}">
                Enter Scene
            </a>
        </div>`;
    museum.appendChild(section);

    const dot = document.createElement('div');
    dot.className = 'dot';
    if (index === 0) dot.classList.add('active');
    dot.addEventListener('click', () => {
        museum.scrollTo({ top: index * window.innerHeight, behavior: 'smooth' });
    });
    navDots.appendChild(dot);
});

const dots     = document.querySelectorAll('.dot');
const progress = document.getElementById('progress');

museum.addEventListener('scroll', () => {
    const idx = Math.round(museum.scrollTop / window.innerHeight);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    const pct = (museum.scrollTop / (museum.scrollHeight - window.innerHeight)) * 100;
    progress.style.height = pct + '%';
});

document.querySelectorAll('.enter').forEach(btn => {
    btn.addEventListener('click', e => {
        e.preventDefault();
        const file  = btn.dataset.file;
        const layer = document.getElementById('transition-layer');
        layer.classList.add('active');
        setTimeout(() => { window.location.href = file; }, 900);
    });
});

const bgCanvas = document.getElementById('space');
const bgCtx    = bgCanvas.getContext('2d');
let bW, bH;

function resizeBg() {
    bW = bgCanvas.width  = window.innerWidth;
    bH = bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const bgStars = Array.from({ length: 300 }, () => ({
    x : Math.random() * bW,
    y : Math.random() * bH,
    r : Math.random() * 1.8,
    a : Math.random(),
    vx: (Math.random() - .5) * 0.04,
    vy: (Math.random() - .5) * 0.04
}));

let bgTime = 0;
function renderBg() {
    bgCtx.clearRect(0, 0, bW, bH);
    bgTime += 0.003;
    const g = bgCtx.createRadialGradient(bW/2, bH/2, 0, bW/2, bH/2, bW * .7);
    g.addColorStop(0, 'rgba(20,40,90,.18)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    bgCtx.fillStyle = g;
    bgCtx.fillRect(0, 0, bW, bH);
    for (const s of bgStars) {
        s.x += s.vx; s.y += s.vy;
        if (s.x < 0) s.x = bW; if (s.x > bW) s.x = 0;
        if (s.y < 0) s.y = bH; if (s.y > bH) s.y = 0;
        const alpha = .2 + Math.sin(bgTime + s.a * 10) * .15;
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(180,220,255,${alpha})`;
        bgCtx.fill();
    }
    requestAnimationFrame(renderBg);
}
renderBg();
</script>
</body>
</html>
