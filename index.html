<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>2026: a digital odyssey — 심연의 방정식</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Space+Mono:wght@400&family=Inter:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#020305;
    --fg:#f3f5f8;
    --muted:#95a0b2;
    --line:rgba(255,255,255,.08);
    --accent:#91c8ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    color:var(--fg);
    font-family:'Inter','Noto Sans KR',sans-serif;
}

canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
}

#museum{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
}

#museum::-webkit-scrollbar{
    display:none;
}

.scene{
    position:relative;
    width:100%;
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    align-items:flex-end;
    padding:clamp(30px,7vw,120px);
    padding-bottom:max(clamp(40px,8vw,120px), calc(env(safe-area-inset-bottom) + 40px));
}

.scene::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.88) 0%,
            rgba(0,0,0,.18) 55%,
            rgba(0,0,0,0) 100%
        );
    z-index:0;
}

.content{
    position:relative;
    z-index:3;
    max-width:780px;
}

.scene-id{
    color:var(--accent);
    font-size:12px;
    letter-spacing:.28em;
    margin-bottom:16px;
    text-transform:uppercase;
}

h1{
    font-size:clamp(34px,5.2vw,82px);
    line-height:1.02;
    font-family:
        'Helvetica Neue',
        'HelveticaNeue',
        'Univers Bold',
        'Arial Black',
        sans-serif;
    font-weight:700;
    letter-spacing:-.03em;
    cursor:pointer;
    display:inline-block;
    transition:color .3s ease;
}

h1:hover{
    color:var(--accent);
}

.poetic{
    margin-top:24px;
    font-size:clamp(18px,2vw,30px);
    line-height:1.7;
    font-weight:300;
}

.desc{
    margin-top:26px;
    color:#adb7c7;
    line-height:1.95;
    max-width:620px;
    font-size:clamp(13px,1vw,16px);
}

.formula{
    margin-top:14px;
    color:rgba(145,200,255,.65);
    font-family:'DM Mono','Space Mono',monospace;
    font-size:clamp(11px,.85vw,13.5px);
    letter-spacing:.06em;
    line-height:1.75;
    max-width:620px;
}

.meta{
    margin-top:32px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.tag{
    padding:9px 12px;
    border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.03);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
}

/* ─────────────────────────────
   Archive Mode Button
───────────────────────────── */

#fixed-top-left{
    position:fixed;
    top:16px;
    left:22px;
    z-index:99999;
    pointer-events:auto;
}

#all-works-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    font-size:8px;
    font-weight:500;

    color:rgba(255,255,255,.78);

    letter-spacing:.18em;
    text-transform:uppercase;
    text-decoration:none;

    padding:4px 9px;

    border:1px solid rgba(255,255,255,.16);

    background:rgba(2,3,5,.68);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border-radius:2px;

    transition:
        background .25s ease,
        color .25s ease,
        border-color .25s ease,
        opacity .25s ease;

    opacity:.82;
}

#all-works-btn:hover{
    background:white;
    color:black;
    border-color:white;
    opacity:1;
}

/* ───────────────────────────── */

#transition-layer{
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    pointer-events:none;
    z-index:9999;
    transition:opacity 1s ease;
}

#transition-layer.active{
    opacity:1;
    pointer-events:all;
}

#title-ui{
    position:fixed;
    top:22px;
    left:110px;
    z-index:500;

    font-size:11px;

    color:rgba(255,255,255,.55);

    letter-spacing:.22em;
    text-transform:uppercase;

    pointer-events:none;
}

#progress{
    position:fixed;
    top:0;
    left:0;
    width:2px;
    height:0;
    background:white;
    z-index:502;
    transition:height .3s ease;
}

#nav-dots{
    position:fixed;
    right:24px;
    top:50%;
    transform:translateY(-50%);
    z-index:500;

    display:flex;
    flex-direction:column;
    gap:14px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:rgba(145,200,255,.18);
    transition:all .4s ease;
    cursor:pointer;
}

.dot.active{
    background:rgba(145,200,255,.85);
    transform:scale(1.7);
}

#opening{
    position:fixed;
    inset:0;
    background:black;
    z-index:88888;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:opacity 2s ease;
}

#opening.hidden{
    opacity:0;
    pointer-events:none;
    visibility:hidden;
}

.open-inner{
    text-align:center;
    margin-bottom:22vh;
}

.open-inner h2{
    font-size:clamp(40px,7vw,100px);
    font-family:Futura, sans-serif;
    font-weight:700;
    line-height:1.06;
    letter-spacing:-.08em;
}

.open-inner .subtitle{
    margin-top:16px;
    color:rgba(255,255,255,.35);
    letter-spacing:.2em;
    font-size:13px;
}

.open-inner p{
    margin-top:26px;
    color:rgba(255,255,255,.5);
    letter-spacing:.3em;
    text-transform:uppercase;
    font-size:12px;
}

#enterBtn{
    margin-top:60px;

    padding:8px 20px;

    background:#9a9a9a;
    border:none;

    color:#111;
    cursor:pointer;

    letter-spacing:.22em;
    text-transform:uppercase;

    transition:all .35s ease;

    font-size:10px;
    font-family:'Inter','Noto Sans KR',sans-serif;
    font-weight:500;
}

#enterBtn:hover{
    background:#b8b8b8;
    color:#000;
}

@media(max-width:768px){

    #museum{
        height:100dvh;
    }

    .scene{
        height:100dvh;

        align-items:flex-end;

        padding:24px 28px;

        padding-top:max(
            60px,
            calc(env(safe-area-inset-top) + 52px)
        );

        padding-bottom:max(
            52px,
            calc(env(safe-area-inset-bottom) + 36px)
        );
    }

    h1{
        font-size:clamp(30px,8.5vw,44px);
        letter-spacing:-.02em;
    }

    .poetic{
        font-size:16px;
        margin-top:16px;
    }

    .desc{
        font-size:12px;
        margin-top:18px;
    }

    .formula{
        font-size:10px;
        margin-top:10px;
    }

    .meta{
        margin-top:20px;
        gap:8px;
    }

    .tag{
        padding:7px 10px;
        font-size:10px;
    }

    #nav-dots{
        display:none;
    }

    #fixed-top-left{
        top:max(14px, env(safe-area-inset-top));
        left:14px;
    }

    #title-ui{
        display:none;
    }

    /* 모바일에서 더 작게 */

    #all-works-btn{
        font-size:7px;
        padding:3px 7px;
        letter-spacing:.10em;
        border-color:rgba(255,255,255,.12);
    }
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div id="opening">
    <div class="open-inner">
        <h2>2026:<br>a digital odyssey</h2>

        <div class="subtitle">
            심연의 방정식 / Equations of the Abyss
        </div>

        <p>Kim Gunwoo — 19th Solo Exhibition</p>

        <button id="enterBtn">DEPART</button>
    </div>
</div>

<div id="transition-layer"></div>

<div id="title-ui">
    2026: A DIGITAL ODYSSEY — 심연의 방정식
</div>

<div id="progress"></div>
<div id="nav-dots"></div>
<div id="museum"></div>

<div id="fixed-top-left">
    <a href="all/index.html" id="all-works-btn">
        Archive Mode
    </a>
</div>

<script>
/* 기존 JS 그대로 유지 */
</script>

</body>
</html>
