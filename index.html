<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026: a digital odyssey — 심연의 방정식</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Space+Mono:wght@400&family=Inter:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#020305;
    --fg:#f3f5f8;
    --muted:#95a0b2;
    --line:rgba(255,255,255,.08);
    --accent:#91c8ff;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{
    width:100%; height:100%;
    overflow:hidden;
    background:black;
    color:var(--fg);
    font-family:'Inter','Noto Sans KR',sans-serif;
}

@font-face {
    font-family:'HelveticaNeue-Title';
    src: local('Helvetica Neue Bold'), local('HelveticaNeue-Bold'),
         local('Univers Bold'), local('Univers-Bold'),
         local('Helvetica Bold'), local('Helvetica-Bold');
    font-weight:700;
}
canvas{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:0;
}
#museum{
    position:relative; z-index:2;
    width:100%; height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
}
#museum::-webkit-scrollbar{ display:none; }
.scene{
    position:relative;
    width:100%; height:100vh;
    scroll-snap-align:start;
    display:flex; align-items:flex-end;
    padding:clamp(20px,4vw,72px);
    padding-bottom:max(clamp(28px,5vw,72px), calc(env(safe-area-inset-bottom) + 28px));
}
.scene::before{
    content:"";
    position:absolute; inset:0;
    background:
        linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.14) 55%, rgba(0,0,0,0) 100%);
    z-index:0;
}
.content{
    position:relative; z-index:3;
    max-width:780px;
}
.scene-id{
    color:var(--accent);
    font-size:11px; letter-spacing:.28em;
    margin-bottom:10px; text-transform:uppercase;
}
h1{
    font-size:clamp(22px,3.4vw,54px);
    line-height:1.02;
    font-family:'Helvetica Neue','HelveticaNeue',
                'Univers Bold','Univers-Bold',
                'Arial Black','Helvetica','Arial',sans-serif;
    font-weight:700;
    letter-spacing:-.03em;
    cursor:pointer;
    display:flex; 
    align-items:center;
    width:fit-content; 
    text-decoration:none; 
    transition:color 0.3s ease;
}
h1:hover{
    color:var(--accent);
}


h1::after {
    content: "";
    display: inline-block;
    
    width: 0.3em;
    height: 0.3em;
    margin-left: 0.12em; 
    background-color: currentColor; 
    
    clip-path: polygon(0% 15%, 100% 15%, 50% 85%);
    flex-shrink: 0;
}

.poetic{
    margin-top:14px;
    font-size:clamp(15px,1.6vw,24px);
    line-height:1.6; font-weight:300;
}
.desc{
    margin-top:14px; color:#adb7c7;
    line-height:1.85; max-width:620px;
    font-size:clamp(12px,.9vw,15px);
}
.formula{
    margin-top:10px; color:rgba(145,200,255,.65);
    font-family:'DM Mono','Space Mono',monospace;
    font-size:clamp(10px,.78vw,12.5px);
    letter-spacing:.06em;
    line-height:1.65;
    max-width:620px;
}
.meta{
    margin-top:18px; display:flex;
    flex-wrap:wrap; gap:8px;
}
.tag{
    padding:7px 10px;
    border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.03);
    font-size:10px; letter-spacing:.14em; text-transform:uppercase;
}
#transition-layer{
    position:fixed; inset:0;
    background:black; opacity:0;
    pointer-events:none; z-index:9999;
    transition:opacity 1s ease;
}
#transition-layer.active{ opacity:1; pointer-events:all; }
#title-ui{
    font-size:10px;
    color:rgba(255,255,255,.45);
    letter-spacing:.22em; text-transform:uppercase;
    pointer-events:none;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
    flex:1;
}
#hint{
    position:fixed; bottom:24px; left:24px;
    z-index:500; pointer-events:none;
    font-size:10px; color:rgba(255,255,255,.48);
    letter-spacing:.04em;
    font-family:'Inter','Noto Sans KR',sans-serif;
    font-weight:300;
}
#fixed-top-left{
    position:fixed;
    top:18px;
    left:18px;
    right:60px;
    z-index:99999;
    pointer-events:none;
    display:flex;
    align-items:center;
    gap:14px;
}

#mode-toggle{
    display:inline-flex;
    align-items:center;
    border:1px solid rgba(255,255,255,.16);
    border-radius:3px;
    background:rgba(2,3,5,0.92);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    overflow:hidden;
    flex-shrink:0;
    pointer-events:auto;
}
#mode-toggle .m-btn{
    font-size:8px;
    letter-spacing:.16em;
    text-transform:uppercase;
    font-weight:500;
    font-family:'Inter','Noto Sans KR',sans-serif;
    padding:5px 11px;
    border:none;
    background:transparent;
    cursor:pointer;
    color:rgba(255,255,255,.35);
    transition:all .28s ease-in-out;
    white-space:nowrap;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:5px;
    line-height:1;
}
#mode-toggle .m-btn.active{
    background:rgba(255,255,255,.94);
    color:#020305;
    border-radius:2px;
}
#mode-toggle .m-btn:not(.active):hover{
    color:rgba(255,255,255,.7);
}
#mode-toggle .m-dot{
    width:3px; height:3px;
    border-radius:50%;
    background:currentColor;
    flex-shrink:0;
    opacity:.7;
}
#mode-toggle .m-btn.active .m-dot{
    background:#c0152a;
    opacity:1;
}
#mode-toggle .m-divider{
    width:1px; height:13px;
    background:rgba(255,255,255,.12);
    flex-shrink:0;
}


#progress{
    position:fixed; top:0; left:0;
    width:2px; height:0;
    background:white; z-index:502;
    transition:height .3s ease;
}
#nav-dots{
    position:fixed; right:max(18px, env(safe-area-inset-right)); top:50%;
    transform:translateY(-50%);
    z-index:1000; display:flex;
    flex-direction:column; gap:14px;
    pointer-events:auto;
}
.dot{
    width:10px; height:10px; min-width:10px; min-height:10px; border-radius:50%;
    background:rgba(145,200,255,.34);
    border:1px solid rgba(255,255,255,.28);
    box-shadow:0 0 0 1px rgba(0,0,0,.45), 0 0 10px rgba(145,200,255,.18);
    transition:transform .25s ease, background-color .25s ease, box-shadow .25s ease;
    cursor:pointer;
}
.dot.active{
    background:rgba(145,200,255,.95);
    transform:scale(1.65);
    box-shadow:0 0 0 1px rgba(0,0,0,.55), 0 0 14px rgba(145,200,255,.72);
}
#opening{
    position:fixed; inset:0;
    background:black; z-index:88888;
    display:flex; align-items:center; justify-content:center;
    transition:opacity 2s ease;
}
#opening.hidden{
    opacity:0;
    pointer-events:none;
    visibility:hidden;
}
.open-inner{ text-align:center; margin-bottom:22vh; }
.open-inner h2{
    font-size:clamp(40px,7vw,100px);
    font-family: 'Futura-Bold', Futura, 'Trebuchet MS', Arial, sans-serif;
    font-weight: 700; line-height:1.06; letter-spacing:-.08em;
}
.open-inner .subtitle{
    margin-top:16px;
    color:rgba(255,255,255,.35);
    letter-spacing:.2em; font-size:13px;
}
.open-inner p{
    margin-top:26px; color:rgba(255,255,255,.5);
    letter-spacing:.3em; text-transform:uppercase; font-size:12px;
}


#enterBtn {
    margin-top: 50px;
    width: 90px;
    height: 78px;
    background: #9a9a9a;
    border: none;
    color: #111;
    cursor: pointer;
    
    
    clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
    
    
    font-size: 8.5px; 
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-weight: 600;
    letter-spacing: .25em;
    text-transform: uppercase;
    text-indent: 0.25em; 
    
    
    display: inline-flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 20px;
    
    transition: all .35s cubic-bezier(0.25, 1, 0.5, 1);
}

#enterBtn:hover {
    background: #e0e0e0;
    color: #000;
    transform: translateY(4px); 
    filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.35));
}

@media(max-width:768px){
    #museum{ height:100dvh; }
    .scene{
        height:100dvh;
        align-items:flex-end;
        padding:18px 22px;
        padding-top:max(52px, calc(env(safe-area-inset-top) + 44px));
        padding-bottom:max(38px, calc(env(safe-area-inset-bottom) + 28px));
    }
    h1{ font-size:clamp(20px,6vw,32px); letter-spacing:-.02em; }
    .poetic{ font-size:14px; margin-top:10px; }
    .desc{ font-size:11px; margin-top:10px; }
    .formula{ font-size:9.5px; margin-top:8px; }
    .meta{ margin-top:14px; gap:6px; }
    .tag{ padding:5px 8px; font-size:9px; }
    #nav-dots{
        display:flex;
        right:max(10px, calc(env(safe-area-inset-right) + 8px));
        gap:10px;
        z-index:1000;
    }
    .dot{
        width:9px;
        height:9px;
        min-width:9px;
        min-height:9px;
        background:rgba(145,200,255,.48);
    }
    .dot.active{ transform:scale(1.55); }
    #fixed-top-left{
        top:max(16px, env(safe-area-inset-top));
        left:16px;
        right:16px;
    }
    #title-ui{ display:none; }
    #mode-toggle .m-btn{
        padding:4px 8px;
        font-size:7px;
        letter-spacing:.1em;
    }
    #mode-toggle{
        backdrop-filter:none;
        -webkit-backdrop-filter:none;
    }
    
    #enterBtn {
        width: 80px;
        height: 69px;
        font-size: 7.5px;
        padding-top: 18px;
    }
}


@media(min-width:769px) and (max-width:1024px){
    #museum{ height:100dvh; }
    .scene{
        height:100dvh;
        padding:clamp(40px,6vw,80px);
        padding-bottom:max(60px, calc(env(safe-area-inset-bottom) + 48px));
    }
    h1{ font-size:clamp(28px,4vw,48px); }
    .poetic{ font-size:clamp(16px,2.2vw,22px); }
}


@media(orientation:landscape) and (max-height:900px){
    #museum{ height:100dvh; }
    .scene{
        height:100dvh;
        
        align-items:flex-start;
        justify-content:flex-start;
        flex-direction:column;
        padding:0;
        padding-top:max(46px, calc(env(safe-area-inset-top) + 38px));
        padding-left:clamp(20px,5vw,72px);
        padding-right:clamp(56px,8vw,110px);
        padding-bottom:max(18px, calc(env(safe-area-inset-bottom) + 14px));
        overflow:hidden;
    }
    
    .content{
        max-width:min(720px,68vw);
        width:100%;
        max-height:calc(
            100dvh
            - max(46px, calc(env(safe-area-inset-top) + 38px))
            - max(18px, calc(env(safe-area-inset-bottom) + 14px))
        );
        overflow-y:auto;
        overflow-x:hidden;
        scrollbar-width:none;
        padding-bottom:6px;
    }
    .content::-webkit-scrollbar{ display:none; }
    
    .scene::before{
        background:
            linear-gradient(to bottom,
                rgba(0,0,0,.76) 0%,
                rgba(0,0,0,.10) 55%,
                rgba(0,0,0,0) 100%);
    }
    .scene-id{ font-size:10px; letter-spacing:.2em; margin-bottom:5px; }
    h1{ font-size:clamp(19px,3.4vh,40px); line-height:1.02; letter-spacing:-.025em; }
    .poetic{ font-size:clamp(13px,2.1vh,20px); margin-top:6px; line-height:1.4; }
    .desc{
        font-size:clamp(11.5px,1.65vh,14.5px);
        margin-top:6px; line-height:1.56; max-width:100%;
    }
    .formula{ font-size:clamp(10px,1.35vh,12.5px); margin-top:5px; line-height:1.42; }
    .meta{ margin-top:8px; gap:5px; }
    .tag{ padding:4px 8px; font-size:9px; letter-spacing:.1em; }
    #hint{
        bottom:max(10px, calc(env(safe-area-inset-bottom) + 7px));
        left:max(16px, calc(env(safe-area-inset-left) + 14px));
        font-size:9px;
    }
    #nav-dots{ right:max(12px, calc(env(safe-area-inset-right) + 10px)); gap:8px; }
    .dot{ width:8px; height:8px; min-width:8px; min-height:8px; }
    #fixed-top-left{
        top:max(10px, env(safe-area-inset-top));
        left:max(14px, env(safe-area-inset-left));
        right:max(48px, calc(env(safe-area-inset-right) + 14px));
    }
    #title-ui{ display:none; }
}
</style>
</head>
<body>

<canvas id="space" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;"></canvas>

<div id="opening">
    <div class="open-inner">
        <h2>2026:<br>a digital odyssey</h2>
        <div class="subtitle">심연의 방정식 / Equations of the Abyss</div>
        <p>Kim Gunwoo — 19th Solo Exhibition</p>
        <button id="enterBtn">DEPART</button>
    </div>
</div>

<div id="transition-layer"></div>

<div id="progress"></div>
<div id="nav-dots"></div>
<div id="museum"></div>
<div id="hint">* 작품의 타이틀을 클릭하세요</div>

<div id="fixed-top-left">
    <div id="mode-toggle">
        <span class="m-btn active" id="btn-cinematic"><span class="m-dot"></span>Cinematic</span>
        <div class="m-divider"></div>
        <a href="all/index.html" class="m-btn" id="btn-archive"><span class="m-dot"></span>Archive</a>
    </div>
    <div id="title-ui">2026: A DIGITAL ODYSSEY — 심연의 방정식</div>
</div>

<script>
const works = [
  { id:"Freeshow.",        title:"RGB Galaxy Engine",         poetic:"우주는 하나의 빛에서 시작된다.",             desc:"세 개의 나선 팔이 회전하며 형성하는 실시간 은하 시뮬레이션.",                                                  formula:"r = √i × 1.6 · θ = i × 0.013 + arm × 2π/3",                                                file:"01-Freeshow.html",          tags:["Procedural Galaxy","Particle Dynamics","Chromatic Bloom"] },
  { id:"Prologue.",        title:"Hyperbolic Nebula",         poetic:"성운은 계산되는 안개이다.",                   desc:"분형 브라운 운동 기반의 실시간 성운 생성 시스템.",                                                             formula:"z = sinh(u)·cosh(v) − tanh(r)",                                                              file:"02-Prologue.html",          tags:["Hyperbolic Geometry","fBm Noise","Volumetric Flow"] },
  { id:"Act I, Scene 1.",  title:"Riemann Dreams",            poetic:"증명되지 않은 우주가 흔들린다.",              desc:"리만 제타 함수 기반 입자 중력 인터랙션.",                                                                     formula:"θ = i × 0.045 + sin(p) × 2 · r = √i × 0.55 + p × 0.08",                                    file:"03-Riemann_dream.html",     tags:["Riemann Zeta","Prime Field","Interactive Gravity"] },
  { id:"Act I, Scene 2.",  title:"Quantum Singularity",       poetic:"특이점은 중심이 아니라 붕괴이다.",            desc:"황금각 기반 입자 공간과 비선형 시간 왜곡 구조.",                                                              formula:"θ = p · 2π/137.507 · r = √p × 12",                                                          file:"04-Quantum_sing.html",      tags:["Golden Angle","Prime Distribution","Gravitational Lens"] },
  { id:"Act II.",          title:"Dual Galaxy",               poetic:"두 개의 중력장이 서로를 뒤틀기 시작한다.",   desc:"쌍성계 기반 이중 은하 충돌 시뮬레이션.",                                                                     formula:"r = √i · θ = i × 0.013 + arm × 2π/2",                                                       file:"05-Dual_Galaxy.html",       tags:["Binary Galaxy","Orbital Collision","Black Hole Core"] },
  { id:"Act III, Scene 1.",title:"Lambert Nebula: Essential", poetic:"빛은 회전하면서 확산된다.",                   desc:"Lambert W 함수 기반 광학 성운 구조.",                                                                        formula:"W₀(x) · FogExp2(density = 0.0025)",                                                          file:"06-Lambert_Essential.html", tags:["Lambert W","Optical Diffusion","Volumetric Nebula"] },
  { id:"Act III, Scene 2.",title:"Lambert Nebula: Archive",   poetic:"가산되는 빛은 심연이 된다.",                  desc:"W₀ × W₋₁ 이중 분지 기반 아카이브 우주 구조.",                                                               formula:"W₀ × W₋₁ · Additive Blending · Core Pulse",                                                  file:"07-Lambert_Archive.html",   tags:["Lambert Branch","Additive Cosmology","Deep Field"] },
  { id:"Act III, Scene 3.",title:"Lambert Nebula",            poetic:"사운드는 공간을 조각한다.",                   desc:"Web Audio API 기반 오디오 반응형 우주 시스템.",                                                              formula:"W₀(x) ∪ W₋₁(x) · Microphone Input",                                                         file:"08-Lambert_nebu.html",      tags:["Audio Reactive","Spectral Space","Generative Soundfield"] },
  { id:"Act IV, Scene 1.", title:"Bessel Bloom",              poetic:"파동은 충돌하며 꽃처럼 피어난다.",           desc:"베셀 함수 기반 파동 간섭 구조.",                                                                             formula:"J₀(x) ≈ √(2/πx) · cos(x − π/4) · z = Σ J₀(dₙ · 0.7 − 3t)",                               file:"09-Bessel_bloom.html",      tags:["Bessel Function","Wave Interference","Harmonic Propagation"] },
  { id:"Act IV, Scene 2.", title:"Lorenz Butterfly",          poetic:"카오스는 질서의 또 다른 이름이다.",          desc:"Lorenz attractor 기반 카오스 시뮬레이션.",                                                                   formula:"ẋ = σ(y − x) · ẏ = x(ρ − z) − y · ż = xy − βz",                                           file:"10-Lorenz_butt.html",       tags:["Lorenz Attractor","Chaotic Flow","Dynamical System"] },
  { id:"Act V, Scene 1.",  title:"Odyssey: Essential",        poetic:"별들은 관측자의 시점을 따라 이동한다.",       desc:"케플러 궤도 기반 블랙홀 강착 원반 시뮬레이션.",                                                              formula:"v(r) = 35.0 / r · Photon Ring",                                                              file:"11-Odyssey_Essential.html", tags:["Accretion Disk","Photon Ring","Relativistic Drift"] },
  { id:"Act V, Scene 2.",  title:"Odyssey: Archive",          poetic:"기억된 우주가 끝없이 확장된다.",              desc:"슈바르츠실트-커 혼합 계량 기반 420,000 particle 우주 공간.",                                                 formula:"Rs = 2GM/c²",                                                                                file:"12-Odyssey_Archive.html",   tags:["Kerr Geometry","Particle Cosmos","Einstein Ring"] },
  { id:"Act V, Scene 3.",  title:"Event Horizon",             poetic:"빛조차 돌아오지 못하는 경계.",               desc:"케플러 회전 및 중력 렌즈 왜곡 기반 블랙홀 구조.",                                                           formula:"ω ∝ r⁻³ᐟ² · Drag to Drift Gaze",                                                            file:"13-Event_Horizon.html",     tags:["Schwarzschild Metric","Gravitational Lensing","Keplerian Orbit"] },
  { id:"Act VI.",          title:"Black Hole Voyage",         poetic:"붕괴는 가장 거대한 음악이다.",               desc:"오디오 반응형 블랙홀 8악장 붕괴 시뮬레이션.",                                                               formula:"Δθ ∝ e<sup>-r/260.0</sup> · Cycle = 180s",                                                           file:"14-Black_Voyage.html",      tags:["Entropy Collapse","Slit-Scan Space","Audio Singularity"] },
  { id:"Epilogue.",        title:"Kerr Plasma Cathedral",     poetic:"모든 입자는 결국 침묵 속으로 사라진다.",     desc:"Kerr 계량 기반 플라즈마 레이마칭 에필로그.",                                                                 formula:"ds² = −(1 − rs·r/ρ²)dt² · 포톤 링 필라멘트",                                                  file:"15-Epilogue.html",          tags:["Kerr Metric","Volumetric Raymarching","Plasma Filament"] }
];


const opening = document.getElementById('opening');

if (sessionStorage.getItem('odyssey_entered')) {
    opening.style.transition = 'none';
    opening.style.opacity    = '0';
    opening.style.visibility = 'hidden';
    opening.style.pointerEvents = 'none';
    opening.classList.add('hidden');
}

document.getElementById('enterBtn').addEventListener('click', () => {
    sessionStorage.setItem('odyssey_entered', '1');
    opening.classList.add('hidden');
    setTimeout(() => {
        opening.style.visibility = 'hidden';
    }, 2100);
});


const museum  = document.getElementById('museum');
const navDots = document.getElementById('nav-dots');

works.forEach((w, index) => {
    const section = document.createElement('section');
    section.className = 'scene';
    section.innerHTML = `
        <div class="content">
            <div class="scene-id">${w.id}</div>
            <h1 class="title-link" data-file="${w.file}">${w.title}</h1>
            <div class="poetic">${w.poetic}</div>
            <div class="desc">${w.desc}</div>
            <div class="formula">${w.formula}</div>
            <div class="meta">
                ${w.tags.map(t => `<div class="tag">${t}</div>`).join('')}
            </div>
        </div>`;
    museum.appendChild(section);

    const dot = document.createElement('div');
    dot.className = 'dot';
    if (index === 0) dot.classList.add('active');
    dot.addEventListener('click', () => {
        museum.scrollTo({ top: index * museum.clientHeight, behavior: 'smooth' });
    });
    navDots.appendChild(dot);
});

const dots     = document.querySelectorAll('.dot');
const progress = document.getElementById('progress');

let uiScrollRaf = null;
function updateScrollUI() {
    uiScrollRaf = null;
    const viewportH = museum.clientHeight || window.innerHeight;
    const idx = Math.round(museum.scrollTop / viewportH);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    const pct = museum.scrollHeight > viewportH
        ? (museum.scrollTop / (museum.scrollHeight - viewportH)) * 100
        : 0;
    progress.style.height = pct + '%';
}

museum.addEventListener('scroll', () => {
    if (!uiScrollRaf) uiScrollRaf = requestAnimationFrame(updateScrollUI);
}, { passive: true });

window.addEventListener('resize', () => {
    if (!uiScrollRaf) uiScrollRaf = requestAnimationFrame(updateScrollUI);
    
    const viewportH = museum.clientHeight || window.innerHeight;
    const currentIdx = Math.round(museum.scrollTop / viewportH);
    requestAnimationFrame(() => {
        museum.scrollTop = currentIdx * (museum.clientHeight || window.innerHeight);
    });
});

document.querySelectorAll('.title-link').forEach(btn => {
    btn.addEventListener('click', () => {
        const file  = btn.dataset.file;
        const layer = document.getElementById('transition-layer');
        layer.classList.add('active');
        setTimeout(() => { window.location.href = file; }, 900);
    });
});


(function() {
    const canvas = document.getElementById('space');
    const isAndroid = /Android/i.test(navigator.userAgent);
    const isMobileViewport = window.matchMedia('(max-width: 768px)').matches;
    const isLandscapeShort = window.matchMedia('(max-height: 600px) and (orientation: landscape)').matches;
    const lowCoreCount = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4;
    const lowMemory = navigator.deviceMemory && navigator.deviceMemory <= 4;
    const lowPowerMode = isAndroid || isMobileViewport || isLandscapeShort || lowCoreCount || lowMemory;
    const glOptions = {
        antialias: false,
        alpha: false,
        depth: false,
        stencil: false,
        preserveDrawingBuffer: false,
        powerPreference: lowPowerMode ? 'low-power' : 'high-performance'
    };
    let gl = canvas.getContext('webgl', glOptions)
          || canvas.getContext('experimental-webgl', glOptions);
    let bgRafId = null;

    if (!gl) {
        const ctx = canvas.getContext('2d');
        let W = canvas.width = window.innerWidth, H = canvas.height = window.innerHeight;
        const stars = Array.from({length:lowPowerMode ? 90 : 300}, () => ({
            x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.8,
            a:Math.random(), vx:(Math.random()-.5)*.04, vy:(Math.random()-.5)*.04
        }));
        const frameInterval = lowPowerMode ? 1000 / 24 : 1000 / 45;
        let lastFallbackFrame = 0;
        let t = 0;
        function fallback(now = performance.now()) {
            bgRafId = requestAnimationFrame(fallback);
            if (now - lastFallbackFrame < frameInterval) return;
            lastFallbackFrame = now;
            ctx.clearRect(0,0,W,H); t += 0.003;
            for (const s of stars) {
                s.x = (s.x + s.vx + W) % W; s.y = (s.y + s.vy + H) % H;
                ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
                ctx.fillStyle = `rgba(180,220,255,${.2+Math.sin(t+s.a*10)*.15})`; ctx.fill();
            }
        }
        fallback();
        window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
        return;
    }

    const VS = `
attribute vec2 a_pos;
void main(){ gl_Position = vec4(a_pos,0.,1.); }
`;

    
    
    const oct1   = lowPowerMode ? 4 : 5;
    const oct2   = lowPowerMode ? 4 : 6;
    const oct3   = lowPowerMode ? 5 : 7;
    const oct3d  = lowPowerMode ? 4 : 5;
    const dualLayer = !lowPowerMode;

    const FS = `
precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform float u_scroll;

float hash(vec2 p){
    p = fract(p * vec2(127.1, 311.7));
    p += dot(p, p + 19.19);
    return fract(p.x * p.y);
}
float hash3(vec3 p){
    p = fract(p * vec3(127.1,311.7,74.7));
    p += dot(p, p+19.19);
    return fract(p.x*p.y*p.z);
}
float noise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    vec2 u = f*f*(3.-2.*f);
    return mix(
        mix(hash(i),hash(i+vec2(1,0)),u.x),
        mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),
        u.y);
}
float noise3(vec3 p){
    vec3 i = floor(p), f = fract(p);
    vec3 u = f*f*(3.-2.*f);
    float a = hash3(i);
    float b = hash3(i+vec3(1,0,0));
    float c = hash3(i+vec3(0,1,0));
    float d = hash3(i+vec3(1,1,0));
    float e = hash3(i+vec3(0,0,1));
    float ff = hash3(i+vec3(1,0,1));
    float g = hash3(i+vec3(0,1,1));
    float h = hash3(i+vec3(1,1,1));
    return mix(mix(mix(a,b,u.x),mix(c,d,u.x),u.y),
               mix(mix(e,ff,u.x),mix(g,h,u.x),u.y),u.z);
}

float fbm(vec2 p, int oct){
    float v=0., a=.5;
    mat2 rot = mat2(.8,.6,-.6,.8);
    for(int i=0;i<8;i++){
        if(i>=oct) break;
        v += a*noise(p); p = rot*p*2.1; a*=.5;
    }
    return v;
}
float fbm3(vec3 p, int oct){
    float v=0., a=.5;
    for(int i=0;i<7;i++){
        if(i>=oct) break;
        v += a*noise3(p); p = p*2.02+vec3(1.31,5.7,9.3); a*=.5;
    }
    return v;
}

vec3 nebula(vec2 uv, float t){
    vec2 q = vec2(fbm(uv + vec2(.0,.0), ${oct1}),
                  fbm(uv + vec2(5.2,1.3), ${oct1}));
    vec2 r = vec2(fbm(uv + 4.*q + vec2(1.7,9.2) + .15*t, ${oct2}),
                  fbm(uv + 4.*q + vec2(8.3,2.8) + .126*t, ${oct2}));
    float f = fbm(uv + 4.*r, ${oct3});
    f = clamp(f, 0., 1.);

    vec3 col = mix(vec3(.004,.008,.025), vec3(.03,.015,.05), clamp(f*2.,0.,1.));
    col = mix(col, vec3(.06,.025,.12), clamp(f*f*4.,0.,1.));
    col = mix(col, vec3(.54,.04,.14), clamp(pow(f,3.)*8.,0.,1.));
    col = mix(col, vec3(.55,.85,1.0), clamp(pow(f,4.)*15.,0.,1.));

    float density = smoothstep(.38, .72, f);
    col *= .55 + density * .45;

    return col * (.3 + .7 * density);
}

float stars(vec2 uv, float scale, float t){
    vec2 g = floor(uv * scale);
    vec2 f = fract(uv * scale) - .5;
    float n = hash(g + 57.3);
    if(n > .97){
        float size = (n-.97)*33. * .6;
        float twinkle = .7 + .3*sin(t*2. + n*47.);
        float d = length(f);
        return size * twinkle * exp(-d*d*120.);
    }
    return 0.;
}

float dustLane(vec2 uv, float t){
    vec3 p = vec3(uv * vec2(.6,.9), t * .04);
    float d = fbm3(p, ${oct3d});
    d = pow(clamp(d-.3, 0., 1.) * 1.7, 1.8);
    return d;
}

void main(){
    vec2 uv = gl_FragCoord.xy / u_res;
    float ar = u_res.x / u_res.y;
    vec2 st = (uv - .5) * vec2(ar, 1.);

    float t = u_time * .06;
    vec2 drift = vec2(sin(t*.3)*.04, cos(t*.2)*.025);

    vec3 col = nebula(st * .9 + drift, t);
    ${dualLayer ? `vec3 col2 = nebula(st * .65 + vec2(.8,-.3) + drift*.7, t*.8);
    col = col + col2 * .35;` : ''}

    float dust = dustLane(st * .5 + drift * .5, u_time);
    col += vec3(.08,.04,.12) * dust * .7;

    float s1 = stars(uv + drift*.02, 60., u_time);
    float s2 = stars(uv * 1.5 + vec2(.17,.43) + drift*.015, 90., u_time + 1.7);
    ${dualLayer ? `float s3 = stars(uv * 2.3 + vec2(.83,.11) + drift*.008, 130., u_time + 3.3);` : 'float s3 = 0.;'}
    vec3 starCol = vec3(.85,.93,1.) * s1
                 + vec3(.98,.9,.75) * s2
                 + vec3(.75,.85,1.) * s3;
    col += starCol * 1.2;

    float scrollFade = .82 + .18 * cos(u_scroll * 3.14159 * 2.);
    col *= scrollFade;

    float vignette = 1. - dot(st * vec2(.55,.6), st * vec2(.55,.6));
    vignette = clamp(vignette, 0., 1.);
    col *= (.45 + .55 * vignette);

    col = col / (col + .55);
    col = pow(col, vec3(.88));

    gl_FragColor = vec4(col, 1.);
}
`;

    function compileShader(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
            console.error('Shader error:', gl.getShaderInfoLog(s));
            gl.deleteShader(s); return null;
        }
        return s;
    }

    const vs = compileShader(gl.VERTEX_SHADER, VS);
    const fs = compileShader(gl.FRAGMENT_SHADER, FS);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.error('Program link error:', gl.getProgramInfoLog(prog));
        return;
    }
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    const uRes    = gl.getUniformLocation(prog, 'u_res');
    const uTime   = gl.getUniformLocation(prog, 'u_time');
    const uScroll = gl.getUniformLocation(prog, 'u_scroll');

    function resize() {
        const dpr = lowPowerMode
            ? Math.min(window.devicePixelRatio || 1, 0.72)
            : Math.min(window.devicePixelRatio || 1, 1.5);
        canvas.width  = Math.floor(window.innerWidth  * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        gl.viewport(0, 0, canvas.width, canvas.height);
    }
    resize();

    let scrollNorm = 0;
    const museumEl = document.getElementById('museum');
    if (museumEl) {
        museumEl.addEventListener('scroll', () => {
            const max = museumEl.scrollHeight - museumEl.clientHeight;
            scrollNorm = max > 0 ? museumEl.scrollTop / max : 0;
        }, { passive: true });
    }

    const startTime = performance.now();
    const frameInterval = lowPowerMode ? 1000 / 24 : 1000 / 60;
    let lastFrame = 0;

    function render(now = performance.now()) {
        bgRafId = requestAnimationFrame(render);
        if (now - lastFrame < frameInterval) return;
        lastFrame = now - ((now - lastFrame) % frameInterval);
        const t = (now - startTime) * 0.001;
        gl.uniform2f(uRes, canvas.width, canvas.height);
        gl.uniform1f(uTime, t);
        gl.uniform1f(uScroll, scrollNorm);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
    render();

    window.addEventListener('resize', resize);

    window.addEventListener('pageshow', (e) => {
        if (e.persisted) {
            if (bgRafId) cancelAnimationFrame(bgRafId);
            resize();
            render();
            const layer = document.getElementById('transition-layer');
            layer.classList.remove('active');
            layer.style.opacity = '0';
            if (sessionStorage.getItem('odyssey_entered')) {
                opening.style.transition = 'none';
                opening.style.opacity    = '0';
                opening.style.visibility = 'hidden';
                opening.style.pointerEvents = 'none';
                opening.classList.add('hidden');
            }
            const scrollTop = museum.scrollTop;
            museum.scrollTop = scrollTop + 1;
            museum.scrollTop = scrollTop;
        }
    });

    window.addEventListener('pagehide', () => {
        if (bgRafId) { cancelAnimationFrame(bgRafId); bgRafId = null; }
    });

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            if (!bgRafId) render();
        } else {
            if (bgRafId) { cancelAnimationFrame(bgRafId); bgRafId = null; }
        }
    });
})();
</script>
</body>
