<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Act IV, Scene 1.</title>
<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#02030a;
    touch-action:none;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
canvas{
    display:block;
}
#title{
    position:fixed;
    top:24px;
    left:24px;
    color:rgba(255,255,255,.75);
    letter-spacing:.25em;
    font-size:12px;
    pointer-events:none;
    z-index:10;
    right:120px;
}
#title span{
    display:block;
    font-size:28px;
    font-weight:200;
    margin-bottom:6px;
}
#back-btn{
    position:fixed;
    top:24px;
    right:24px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:12px;
    letter-spacing:.25em;
    border:1px solid rgba(255,255,255,.2);
    padding:8px 16px;
    border-radius:4px;
    transition:all .3s ease;
    z-index:10;
}
#back-btn:hover{
    color:rgba(255,255,255,1);
    background:rgba(255,255,255,.1);
    border-color:rgba(255,255,255,.5);
}
@media (max-width: 640px) {
    #title {
        top: 20px;
        left: 20px;
        right: 100px;
    }
    #title span {
        font-size: 18px;
        margin-bottom: 4px;
    }
    #title {
        font-size: 10px;
        letter-spacing: .15em;
    }
    #back-btn {
        top: 20px;
        right: 20px;
        padding: 6px 12px;
        font-size: 10px;
    }
}
</style>
</head>
<body>

<div id="title">
<span>BESSEL BLOOM</span>
J₀(x) ≈ √(2/πx)·cos(x−π/4) &nbsp;·&nbsp; z = Σ J₀(dₙ·0.7 − 3t)&nbsp;·&nbsp;Click
</div>

<a href="javascript:history.back()" id="back-btn">BACK</a>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,20,80);

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    powerPreference:"high-performance"
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

function J0(x){
    const ax=Math.abs(x);
    if(ax<3){
        const y=x*x;
        return 1-y/4+y*y/64-y*y*y/2304+y*y*y*y/147456;
    }
    return Math.sqrt(2/(Math.PI*ax))*Math.cos(ax-Math.PI/4);
}

const MAX_CENTERS=12;
const centers=[];

function addCenter(x,y){
    centers.push({
        x:x,
        y:y,
        life:1,
        phase:Math.random()*100
    });
    if(centers.length>MAX_CENTERS){
        centers.shift();
    }
}

for(let i=0;i<4;i++){
    addCenter((Math.random()-0.5)*30, (Math.random()-0.5)*30);
}

const stars=[];
const starGeo = new THREE.SphereGeometry(0.5, 12, 12);

function rebuildStars(){
    stars.forEach(s=>scene.remove(s));
    stars.length=0;
    for(let c of centers){
        const m = new THREE.Mesh(starGeo, new THREE.MeshBasicMaterial({color:0xffffff}));
        m.position.set(c.x, c.y, 0);
        scene.add(m);
        stars.push(m);
    }
}
rebuildStars();

const COUNT=12000;
const positions=new Float32Array(COUNT*3);
const colors=new Float32Array(COUNT*3);
const base=[];

for(let i=0;i<COUNT;i++){
    const r= Math.random()*40;
    const th= Math.random()*Math.PI*2;
    const x= Math.cos(th)*r;
    const y= Math.sin(th)*r;
    base.push({x,y});
    positions[i*3]=x;
    positions[i*3+1]=y;
    positions[i*3+2]=0;
}

const geo=new THREE.BufferGeometry();
geo.setAttribute("position", new THREE.BufferAttribute(positions,3));
geo.setAttribute("color", new THREE.BufferAttribute(colors,3));

const mat=new THREE.PointsMaterial({
    size:0.45,
    vertexColors:true,
    transparent:true,
    opacity:.9,
    blending: THREE.AdditiveBlending
});

const cloud=new THREE.Points(geo, mat);
scene.add(cloud);

window.addEventListener("pointerdown", e=>{
    if(e.target.id === 'back-btn') return;
    const x=(e.clientX/window.innerWidth-.5)*60;
    const y=-(e.clientY/window.innerHeight-.5)*60;
    addCenter(x,y);
    rebuildStars();
});

let t=0;
function animate(){
    requestAnimationFrame(animate);
    t+=0.01;

    for(let c of centers){
        c.phase+=0.003;
        c.x+=Math.sin(c.phase*0.7)*0.015;
        c.y+=Math.cos(c.phase*0.5)*0.015;
    }

    for(let i=0;i<stars.length;i++){
        stars[i].position.x=centers[i].x;
        stars[i].position.y=centers[i].y;
    }

    const pos=geo.attributes.position.array;
    const col=geo.attributes.color.array;

    for(let i=0;i<COUNT;i++){
        const p=base[i];
        let h=0;
        for(let c of centers){
            const dx=p.x-c.x;
            const dy=p.y-c.y;
            const d=Math.sqrt(dx*dx+dy*dy);
            h+=J0(d*0.7-t*3);
        }
        pos[i*3+2]=h*4;

        const a=Math.sin(h*0.35+t*0.25);
        const b=Math.sin(h*0.6+t*0.18);
        const c=Math.sin(h*0.15+t*0.35);

        col[i*3]=0.10+0.20*(a+1)*0.5;
        col[i*3+1]=0.35+0.65*(b+1)*0.5;
        col[i*3+2]=0.55+0.45*(c+1)*0.5;
    }

    geo.attributes.position.needsUpdate=true;
    geo.attributes.color.needsUpdate=true;

    camera.position.x=Math.cos(t*0.05)*75;
    camera.position.z=Math.sin(t*0.05)*75;
    camera.position.y=18+Math.sin(t*0.03)*10;
    camera.lookAt(0,0,0);

    cloud.rotation.z+=0.0006;
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", ()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
