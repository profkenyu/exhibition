<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Act III, Scene 2.</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#020208;
    touch-action:none;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
canvas{
    display:block;
    width:100%;
    height:100%;
}
#title{
    position:fixed;
    top:24px;
    left:24px;
    color:rgba(255,255,255,.75);
    letter-spacing:.25em;
    font-size:12px;
    pointer-events:none;
    right:120px;
    z-index:10;
}
#title span{
    display:block;
    font-size:28px;
    font-weight:200;
    margin-bottom:6px;
}
#back-btn{
    position:fixed;
    top:24px;
    right:24px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:12px;
    letter-spacing:.25em;
    border:1px solid rgba(255,255,255,.2);
    padding:8px 16px;
    border-radius:4px;
    transition:all .3s ease;
    z-index:10;
}
#back-btn:hover{
    color:rgba(255,255,255,1);
    background:rgba(255,255,255,.1);
    border-color:rgba(255,255,255,.5);
}
@media (max-width: 640px) {
    #title {
        top: 20px;
        left: 20px;
        right: 100px;
    }
    #title span {
        font-size: 18px;
        margin-bottom: 4px;
    }
    #title {
        font-size: 10px;
        letter-spacing: .15em;
    }
    #back-btn {
        top: 20px;
        right: 20px;
        padding: 6px 12px;
        font-size: 10px;
    }
}
</style>
</head>
<body>
<div id="title">
<span>LAMBERT NEBULA: ARCHIVE</span>
W₀ × W₋₁ · Move Mouse / Click · Core Pulse
</div>
<a href="javascript:history.back()" id="back-btn">BACK</a>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 80;
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
function W0(x){
    let w=Math.log(1+x);
    for(let i=0;i<20;i++){
        let e=Math.exp(w);
        let f=w*e-x;
        w-=f/(e*(w+1));
    }
    return w;
}
function Wm1(x){
    let w=Math.log(-x);
    for(let i=0;i<30;i++){
        let e=Math.exp(w);
        let f=w*e-x;
        let den=e*(w+1)-((w+2)*f)/(2*w+2);
        w-=f/den;
    }
    return w;
}
const COUNT = 120000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(COUNT*3);
const col = new Float32Array(COUNT*3);
const nebulaCenters=[[-120,0,-80],[120,20,40],[0,-90,120],[0,100,-140],[-180,80,160],[180,-60,-160]];
for(let i=0;i<COUNT;i++){
    const useLower = Math.random()>0.5;
    const x = -1/Math.E + Math.random()*5;
    let r;
    if(useLower){
        const xx = -1/Math.E + Math.random()*(1/Math.E);
        r=-Wm1(xx);
    }else{
        r=W0(x);
    }
    const center = nebulaCenters[Math.floor(Math.random()*nebulaCenters.length)];
    const t = Math.random()*Math.PI*80;
    const spiral = r*18 + Math.random()*20;
    const X = center[0] + Math.cos(t)*spiral;
    const Y = center[1] + Math.sin(t)*spiral;
    const Z = center[2] + (t*1.1)-120 + (Math.random()-0.5)*40;
    pos[i*3]=X;
    pos[i*3+1]=Y;
    pos[i*3+2]=Z;
    const glow=0.6+Math.random()*0.4;
    if(useLower){
        col[i*3]=0.15*glow;
        col[i*3+1]=0.6*glow;
        col[i*3+2]=1.0*glow;
    }else{
        col[i*3]=1.0*glow;
        col[i*3+1]=0.35*glow;
        col[i*3+2]=0.25*glow;
    }
}
geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
geo.setAttribute('color', new THREE.BufferAttribute(col,3));
const mat = new THREE.PointsMaterial({
    size:.4,
    vertexColors:true,
    transparent:true,
    opacity:.85,
    blending: THREE.AdditiveBlending
});
const points = new THREE.Points(geo, mat);
scene.add(points);
const core = new THREE.Mesh(
    new THREE.SphereGeometry(2, 32, 32),
    new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(core);
let targetRX=0;
let targetRY=0;
window.addEventListener('pointermove', e=>{
    targetRY=(e.clientX/window.innerWidth-.5)*1.5;
    targetRX=(e.clientY/window.innerHeight-.5)*1.0;
});
window.addEventListener('click', ()=>{
    core.scale.set(2, 2, 2);
});
let t=0;
function animate(){
    requestAnimationFrame(animate);
    t+=0.003;
    points.rotation.z +=0.0008;
    points.rotation.y +=0.0012;
    camera.position.x=Math.cos(t)*260;
    camera.position.z=Math.sin(t)*260;
    camera.lookAt(0,0,0);
    scene.rotation.x +=(targetRX-scene.rotation.x)*0.02;
    scene.rotation.y +=(targetRY-scene.rotation.y)*0.02;
    core.scale.lerp(new THREE.Vector3(1,1,1), 0.05);
    const c = 0.5+0.5*Math.sin(t*10);
    core.material.color.setRGB(1, c, c);
    renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', ()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
